<!DOCTYPE html>
<html>
<head>
  <title>Checkout</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin:0;
      font-family: Arial, sans-serif;
      background:#ffffff;
      color:#111827;
    }

    /* NAVBAR */
    .nav {
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:15px 25px;
      border-bottom:1px solid #e5e7eb;
      position:sticky;
      top:0;
      background:white;
      z-index:1000;
    }

    .nav img {
      height:45px;
    }

    .nav-links {
      display:flex;
      gap:20px;
    }

    .nav-links a {
      text-decoration:none;
      color:#6b7280;
      font-size:14px;
    }

    .nav-links a:hover {
      color:#16a34a;
    }

    .cta {
      background:#16a34a;
      color:white !important;
      padding:8px 14px;
      border-radius:8px;
    }

    /* MOBILE MENU */
    .menu-btn {
      display:none;
      font-size:22px;
      cursor:pointer;
    }

    @media(max-width:768px) {
      .nav-links {
        display:none;
        flex-direction:column;
        position:absolute;
        top:60px;
        right:20px;
        background:white;
        border:1px solid #e5e7eb;
        padding:15px;
        border-radius:10px;
      }

      .nav-links.show {
        display:flex;
      }

      .menu-btn {
        display:block;
      }
    }

    /* MAIN */
    .container {
      max-width:700px;
      margin:auto;
      padding:40px 20px;
      text-align:center;
    }

    h1 {
      font-size:32px;
    }

    .input-box {
      margin-top:20px;
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
    }

    input {
      padding:12px;
      font-size:18px;
      border:2px solid #e5e7eb;
      border-radius:8px;
      text-transform:uppercase;
    }

    button {
      background:#16a34a;
      color:white;
      border:none;
      padding:12px 20px;
      border-radius:8px;
      font-weight:bold;
      cursor:pointer;
    }

    button:hover {
      background:#15803d;
    }

    .card {
      margin-top:30px;
      border:1px solid #e5e7eb;
      padding:25px;
      border-radius:16px;
    }

    .packages {
      display:flex;
      gap:20px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:20px;
    }

    .pkg {
      border:2px solid #e5e7eb;
      padding:20px;
      border-radius:12px;
      width:220px;
      cursor:pointer;
    }

    .pkg.selected {
      border:2px solid #16a34a;
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<div class="nav">
  <a href="index.html">
    <img src="./mylogo/logo.png" style="height:90px;">
  </a>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <div class="nav-links" id="menu">
    <a href="index.html">Home</a>
    <a href="pricing.html">Pricing</a>
    <a href="contact.html">Contact</a>
    <a href="check.html" class="cta">Check Vehicle</a>
  </div>
</div>
<!-- MAIN -->
<div class="container">
  <h1>Complete Your Free Check</h1>
  <!-- INPUT -->
  <div class="input-box">
    <input id="regInput" placeholder="ENTER REG">
    <button onclick="startFlow()">Check Vehicle</button>
  </div>

  <!-- CONTENT -->
  <div id="content"></div>
</div>
<script>
const API_BASE = "https://vehicle-history-backend-production.up.railway.app";

let selectedPackage = "premium";
let currentReg = "";

/* MOBILE MENU */
function toggleMenu() {
  document.getElementById("menu").classList.toggle("show");
}

/* START FLOW */
function startFlow() {
  const reg = document.getElementById("regInput").value.trim().toUpperCase();

  if (!reg) {
    alert("Enter registration");
    return;
  }

  currentReg = reg;
  renderPackages();
}

/* RENDER PACKAGES */
function renderPackages() {

  document.getElementById("content").innerHTML = `
    <div class="card">

      <h2>${currentReg}</h2>

      <p style="color:#6b7280;">
        Choose your report package
      </p>

      <div class="packages">

        <div class="pkg" id="standard" onclick="selectPkg('standard')">
          <h3>Standard</h3>
          <h2>£4.99</h2>
        </div>

        <div class="pkg selected" id="premium" onclick="selectPkg('premium')">
          <h3>Premium</h3>
          <h2>£9.99</h2>
        </div>

      </div>

      <button style="margin-top:20px;" onclick="pay()">
        Continue Payment
      </button>

    </div>
  `;
}

/* SELECT PACKAGE */
function selectPkg(pkg) {
  selectedPackage = pkg;

  document.getElementById("standard").classList.remove("selected");
  document.getElementById("premium").classList.remove("selected");

  document.getElementById(pkg).classList.add("selected");
}

/* PAYMENT */
async function pay() {
  try {
    const res = await fetch(`${API_BASE}/payment/checkout`, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        reg: currentReg,
        pkg: selectedPackage
      })
    });

    const data = await res.json();

    if (data.url) {
      window.location.href = data.url;
    } else {
      alert("Payment failed");
    }

  } catch {
    alert("Server error");
  }
}
</script>
</body>
</html>
