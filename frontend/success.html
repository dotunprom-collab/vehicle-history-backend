<!DOCTYPE html>
<html>
<head>
  <title>Premium Vehicle Report</title>
  <style>
    body {
      margin:0;
      font-family: Arial, sans-serif;
      background:#ffffff;
      color:#111827;
    }

    /* NAVBAR */
    .nav {
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:15px 25px;
      border-bottom:1px solid #e5e7eb;
      background:white;
      position:sticky;
      top:0;
      z-index:1000;
    }

    .nav img {
      height:45px;
    }

    .nav-links {
      display:flex;
      gap:20px;
    }

    .nav-links a {
      text-decoration:none;
      color:#6b7280;
      font-size:14px;
    }

    .nav-links a:hover {
      color:#16a34a;
    }

    /* MOBILE */
    .menu-btn {
      display:none;
      font-size:22px;
      cursor:pointer;
    }

    @media(max-width:768px) {
      .nav-links {
        display:none;
        flex-direction:column;
        position:absolute;
        top:60px;
        right:20px;
        background:white;
        border:1px solid #e5e7eb;
        padding:15px;
        border-radius:10px;
      }

      .nav-links.show {
        display:flex;
      }

      .menu-btn {
        display:block;
      }
    }

    /* MAIN */
    .container {
      max-width:1000px;
      margin:auto;
      padding:30px 20px;
    }

    .card {
      background:white;
      border:1px solid #e5e7eb;
      padding:20px;
      border-radius:16px;
    }

    .grid {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
      margin-top:20px;
    }

    @media(max-width:768px) {
      .grid {
        grid-template-columns:1fr;
      }
    }

    .small-card {
      border:1px solid #e5e7eb;
      padding:15px;
      border-radius:10px;
    }

    .green {
      color:#16a34a;
    }

    .btn {
      padding:15px 30px;
      background:#16a34a;
      border:none;
      border-radius:10px;
      color:white;
      font-size:16px;
      cursor:pointer;
    }

    .btn:hover {
      background:#15803d;
    }
  </style>
</head>
<body>
<!-- NAVBAR -->
<div class="nav">
  <a href="index.html">
    <img src="./mylogo/logo.png" style="height:90px;">
  </a>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <div class="nav-links" id="menu">
    <a href="index.html">Home</a>
    <a href="pricing.html">Pricing</a>
    <a href="contact.html">Contact</a>
    <a href="check.html">Check Vehicle</a>
  </div>
</div>
<!-- MAIN -->
<div class="container">
  <div id="report">Loading premium report...</div>
</div>
<script>
const API = "https://vehicle-history-backend-production.up.railway.app";

const urlParams = new URLSearchParams(window.location.search);
const sessionId = urlParams.get("session_id");

/* MOBILE MENU */
function toggleMenu() {
  document.getElementById("menu").classList.toggle("show");
}

async function loadReport() {

  try {

    const res1 = await fetch(`${API}/payment/success?session_id=${sessionId}`);
    const sessionData = await res1.json();
    const reg = sessionData.reg;

    const res2 = await fetch(`${API}/vehicle/full`, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ registration: reg })
    });

    const data = await res2.json();

    if (data.error) {
      document.getElementById("report").innerHTML = `<p style="color:red;">${data.error}</p>`;
      return;
    }

    let riskColor = "#16a34a";
    if (data.riskScore > 60) riskColor = "red";
    else if (data.riskScore > 30) riskColor = "orange";

    document.getElementById("report").innerHTML = `

      <!-- TOP -->
      <div class="card">

        <div style="display:flex; justify-content:space-between; flex-wrap:wrap;">

          <div>
            <h2>${data.make} ${data.model}</h2>
            <p style="color:#6b7280;">${data.fuel} • ${data.colour}</p>
            <h1>${data.reg}</h1>
          </div>

          <div style="text-align:center;">
            <div style="font-size:28px; font-weight:bold; color:${riskColor};">
              ${data.riskScore}/100
            </div>
            <div style="color:#6b7280;">Risk Score</div>
          </div>

        </div>

      </div>

      <!-- GRID -->
      <div class="grid">

        ${card("Mileage", data.mileage + " miles")}
        ${card("Engine", data.engineSize)}
        ${card("Body Style", data.bodyStyle)}
        ${card("First Registered", data.year)}

        ${statusCard("MOT Status", data.motValid)}
        ${statusCard("Tax Status", data.taxValid)}
        ${statusCard("Mileage Issues", !data.mileageIssue)}
        ${statusCard("Finance Check", data.finance !== "outstanding")}
        ${statusCard("Stolen Check", data.stolen !== "yes")}
        ${statusCard("Write-off Check", data.writeOff !== "yes")}

      </div>

      <!-- VALUE -->
      <div class="card" style="margin-top:20px; text-align:center;">
        <h3>💰 Estimated Value</h3>
        <h1 class="green">£${data.estimatedValue || "N/A"}</h1>
      </div>

      <!-- AI -->
      <div class="card" style="margin-top:20px;">
        <h3>🤖 AI Insights</h3>

        ${
          data.insights && data.insights.length
            ? data.insights.map(i => `<div style="margin-top:10px;">${i}</div>`).join("")
            : "<div>No insights available</div>"
        }
      </div>

      <!-- MOT -->
      <div class="card" style="margin-top:20px;">
        <h3>MOT History</h3>
        ${renderMot(data.motHistory)}
      </div>

      <!-- CTA -->
      <div style="margin-top:30px; text-align:center;">
        <button class="btn">📄 Download PDF Report</button>
      </div>

    `;
  } catch {
    document.getElementById("report").innerHTML = "❌ Server error";
  }
}

function card(title, value) {
  return `
    <div class="small-card">
      <div style="color:#6b7280;">${title}</div>
      <div style="font-weight:bold;">${value}</div>
    </div>
  `;
}

function statusCard(title, ok) {
  return `
    <div class="small-card">
      <div style="color:#6b7280;">${title}</div>
      <div style="font-weight:bold; color:${ok ? "#16a34a" : "red"};">
        ${ok ? "✔ Clear" : "⚠ Issue"}
      </div>
    </div>
  `;
}

function renderMot(mot) {
  if (!mot || mot.length === 0) {
    return "<p>No MOT history available</p>";
  }

  return mot.slice(0,5).map(m => `
    <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #e5e7eb;">
      <span>${m.Date || "N/A"}</span>
      <span>${m.Result || "N/A"}</span>
      <span>${m.Odometer || ""} miles</span>
    </div>
  `).join("");
}

loadReport();
</script>
</body>
</html>
