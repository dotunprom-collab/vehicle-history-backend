<!DOCTYPE html>
<html>
<head>
  <title>Vehicle Report</title>
</head>

<body style="margin:0; font-family:Arial; background:#eef1f5;">

<!-- HEADER -->
<div style="
  text-align:center;
  padding:20px;
  font-weight:bold;
  font-size:18px;
">
  🚗 AutoCheck UK
</div>

<!-- MAIN REPORT -->
<div id="report" style="
  max-width:700px;
  margin:40px auto;
  padding:20px;
">
  Loading report...
</div>

<script>
const API_BASE = "https://vehicle-history-backend-production.up.railway.app";

async function loadReport() {
  const urlParams = new URLSearchParams(window.location.search);
  const sessionId = urlParams.get("session_id");

  if (!sessionId) {
    document.getElementById("report").innerHTML = "❌ No session ID";
    return;
  }

  try {
    // 🔥 STEP 1: GET SESSION DATA
    const res1 = await fetch(`${API_BASE}/payment/success?session_id=${sessionId}`);
    const sessionData = await res1.json();

    console.log("SESSION DATA:", sessionData);

    if (!sessionData.reg) {
      document.getElementById("report").innerHTML = "❌ No registration found";
      return;
    }

    const reg = sessionData.reg;

    // 🚀 STEP 2: GET FULL REPORT
    const res2 = await fetch(`${API_BASE}/vehicle/full`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ registration: reg })
    });

    const data = await res2.json();
    console.log("FULL DATA:", data);

    document.getElementById("report").innerHTML = `
    <pre>${JSON.stringify(data, null, 2)}</pre>
    `;
    return;

    console.log("FULL DATA:", data);

 if (data.error) {
  document.getElementById("report").innerHTML = `
    <div style="background:white;padding:20px;border-radius:10px;">
      <h2>🚗 ${data.reg}</h2>
      <p>⚠️ Limited data available</p>
      <p>Basic vehicle info could not be fully retrieved.</p>
    </div>
  `;
  return;
}

    // 🎯 RISK COLOR
    const riskColor = data.riskScore > 50 ? "#d32f2f" : "#00c853";

    // ✅ RENDER UI
    document.getElementById("report").innerHTML = `
      <div style="
        background:white;
        padding:25px;
        border-radius:16px;
        box-shadow:0 10px 30px rgba(0,0,0,0.1);
      ">

        <!-- VEHICLE HEADER -->
        <div style="text-align:center;">
          <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70"
            style="width:100%; max-height:200px; object-fit:cover; border-radius:12px;" />

          <div style="margin-top:-25px;">
            <span style="
              background:#ffcc00;
              padding:10px 20px;
              font-weight:bold;
              font-size:20px;
              border-radius:6px;
              border:2px solid #333;
            ">
              ${reg}
            </span>
          </div>

          <h2 style="margin-top:15px;">
            🚗 ${data.make} (${data.year})
          </h2>

          <p style="color:#777;">
            ${data.fuel} • ${data.colour}
          </p>
        </div>

        <hr style="margin:25px 0;">

        <!-- RISK SCORE -->
        <div style="text-align:center;">
          <div style="font-size:28px; font-weight:bold;">
            ${data.riskScore}/100
          </div>

          <div style="
            height:10px;
            background:#eee;
            border-radius:6px;
            margin-top:10px;
          ">
            <div style="
              width:${data.riskScore}%;
              height:100%;
              background:${riskColor};
              border-radius:6px;
            "></div>
          </div>

          <p style="margin-top:10px; color:${riskColor}; font-weight:bold;">
            ${data.riskScore > 50 ? "⚠ High Risk" : "✔ Low Risk"}
          </p>
        </div>

        <hr style="margin:25px 0;">

        <!-- CHECKS -->
        ${renderCheck("Outstanding Finance", data.finance !== "outstanding")}
        ${renderCheck("Stolen Vehicle", data.stolen !== "yes")}
        ${renderCheck("Write-off Record", data.writeOff !== "yes")}

        <hr style="margin:25px 0;">

        <!-- SUMMARY -->
        <div style="
          padding:15px;
          background:#e6f7e6;
          border-radius:10px;
          text-align:center;
          font-weight:bold;
        ">
          ✔ No major risks detected
        </div>

        <!-- FOOTNOTE -->
        <p style="
          font-size:10px;
          color:#999;
          text-align:center;
          margin-top:15px;
        ">
          Data sourced from multiple UK vehicle databases
        </p>

      </div>
    `;
  } catch (err) {
    console.error("ERROR:", err);
    document.getElementById("report").innerHTML = "❌ Server error";
  }
}

// 🔧 HELPER FUNCTION
function renderCheck(label, isClear) {
  return `
    <div style="
      display:flex;
      justify-content:space-between;
      padding:12px;
      background:#f9f9f9;
      border-radius:8px;
      margin-top:10px;
    ">
      <span>${label}</span>
      <span style="color:${isClear ? '#00a000' : '#d32f2f'}; font-weight:bold;">
        ${isClear ? '✔ Clear' : '⚠ Issue'}
      </span>
    </div>
  `;
}

// 🚀 RUN
loadReport();
</script>

</body>
</html>
