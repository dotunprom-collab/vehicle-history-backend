<script>
const API_BASE = "https://vehicle-history-backend-production.up.railway.app";

// ✅ GET SESSION ID FROM URL
const urlParams = new URLSearchParams(window.location.search);
const sessionId = urlParams.get("session_id");

async function loadReport() {

  if (!sessionId) {
    document.body.innerHTML = "❌ No session ID found";
    return;
  }

  try {
    // 🔥 GET REG FROM BACKEND
    const res = await fetch(`${API_BASE}/payment/success?session_id=${sessionId}`);
    const sessionData = await res.json();

    console.log("SESSION DATA:", sessionData); // 👈 DEBUG

    if (sessionData.error) {
      document.body.innerHTML = "❌ " + sessionData.error;
      return;
    }

    const reg = sessionData.reg;

    if (!reg) {
      document.body.innerHTML = "❌ No registration found";
      return;
    }

    // 🚀 NOW LOAD FULL REPORT
    const res2 = await fetch(`${API_BASE}/vehicle/full`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ registration: reg })
    });

    const data = await res2.json();
    console.log("FULL DATA:", data);

    if (data.error) {
      document.body.innerHTML = "❌ Failed to load report";
      return;
    }

    // ✅ DISPLAY REPORT
    document.body.innerHTML = `
      <div style="padding:40px; font-family:Arial;">
        <h1>🚗 Full Vehicle Report</h1>

        <h2>${data.make} (${data.year})</h2>
        <p>${data.fuel} • ${data.colour}</p>

        <hr>

        <p><strong>Finance:</strong> Clear</p>
        <p><strong>Stolen:</strong> No</p>
        <p><strong>Write-off:</strong> No</p>

        <div style="
          margin-top:20px;
          padding:15px;
          background:#e6f7e6;
          border-radius:10px;
        ">
          ✔ Full report unlocked successfully
        </div>
      </div>
    `;

  } catch (err) {
    document.body.innerHTML = "❌ Server error";
  }
}

// 🚀 RUN
loadReport();
</script>
