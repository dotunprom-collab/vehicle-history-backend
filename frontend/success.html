<!DOCTYPE html>
<html>
<head>

  <style>

    .section {
  margin-top:20px;
}

.hero {
  background:white;
  border-radius:16px;
  padding:25px;
  display:flex;

}

.reg {

  font-weight:bold;

}

}

  padding:10px;

}

.badge {
  padding:6px 12px;
  border-radius:20px;

  display:inline-block;
}

.low { background:#dcfce7; color:#166534; }
.medium { background:#fef9c3; color:#854d0e; }

.risk-score {
  font-size:32px;
  font-weight:bold;
}

/* 🔥 PREMIUM UPGRADE (ADD ONLY) */
.card {
  box-shadow: 0 10px 30px rgba(0,0,0,0.04);
}

.hero {
  border: 1px solid #e5e7eb;
  background: linear-gradient(to right, #ffffff, #f9fafb);
}

.premium-banner {
  background: #111827;
  color: white;
  padding: 10px 15px;
  border-radius: 10px;
  font-size: 13px;
  margin-bottom: 15px;
}

  </style>
</head>
<body>
<!-- NAVBAR -->
<div class="nav">
  <a href="index.html">
    <img src="./mylogo/logo.png" style="height:90px;">
  </a>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <div class="nav-links" id="menu">
    <a href="index.html">Home</a>
    <a href="pricing.html">Pricing</a>
    <a href="contact.html">Contact</a>
    <a href="check.html">Check Vehicle</a>
  </div>
</div>
<!-- MAIN -->
<div class="container">
  <div id="report">Loading premium report...</div>
</div>

<script>
const API = "https://vehicle-history-backend-production.up.railway.app";

const urlParams = new URLSearchParams(window.location.search);
const sessionId = urlParams.get("session_id");
const regFromDashboard = urlParams.get("reg");

let globalReg = null;

/* MOBILE MENU */
function toggleMenu() {
  const menu = document.getElementById("menu");
  if (menu) menu.classList.toggle("show");
}

async function loadReport() {
  try {

    console.log("🚀 LOAD REPORT STARTED"); // ✅ ADDED HERE

    // 🔐 LOCK PAGE
    if (!sessionId) {
      window.location.href = "/";
      return;
    }

    const reportEl = document.getElementById("report");

    if (!reportEl) {
      console.error("❌ #report element not found");
      return;
    }

    // ✅ GET REG FROM STRIPE
    console.log("SESSION ID:", sessionId);

    console.log("🚀 STEP 1: calling /payment/success"); // ✅ ADDED

    const res1 = await fetch(`${API}/payment/success?session_id=${sessionId}`);

    console.log("🚀 STEP 2: payment response status:", res1.status); // ✅ ADDED

    if (!res1.ok) {
      reportEl.innerHTML = "❌ Failed to verify payment";
      return;
    }

    const sessionData = await res1.json();

    console.log("🚀 STEP 3: session data:", sessionData); // ✅ ADDED

    console.log("SESSION DATA:", sessionData);

    const reg = sessionData?.reg;

    if (!reg) {
      reportEl.innerHTML = "❌ Payment session invalid";
      return;
    }

    localStorage.setItem("paid_" + reg, "true");
    globalReg = reg;

    // =========================
    // 🔽 ADD THIS NEXT PART BELOW YOUR EXISTING CODE
    // =========================

    console.log("🚀 STEP 4: calling /vehicle/full"); // ✅ ADD HERE

    const res2 = await fetch(`${API}/vehicle/full`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ registration: reg, paid: true })
    });

    console.log("🚀 STEP 5: full response status:", res2.status); // ✅ ADD
    const data = await res2.json();
    // 🧠 PLAN DETECTION (ADD HERE)
    const isPremium = data.finance !== "unknown";
    console.log("🚀 STEP 6: full report data:", data); // ✅ ADD

    if (data.error) {
      console.warn("⚠ Using fallback data");
    }

    // ✅ RISK LOGIC
    let riskClass = "low";
    let riskText = "LOW RISK";

    if (data.riskScore > 60) {
      riskClass = "high";
      riskText = "HIGH RISK";
    } else if (data.riskScore > 30) {
      riskClass = "medium";
      riskText = "MEDIUM RISK";
    }

    // ✅ RENDER UI
    reportEl.innerHTML = `
    <div class="premium-banner">
      ✔ Verified vehicle report • Generated instantly • Trusted data sources
    </div>
    ${data.image ? `
    <img src="${data.image}" 
       style="width:120px; margin-top:10px; border-radius:10px;">
    ` : ""}

    <div class="hero">
      <div style="margin-bottom:10px;">
        <span class="badge ${isPremium ? 'high' : 'low'}" 
            style="background:${isPremium ? '#111' : '#e5e7eb'}; color:${isPremium ? '#fff' : '#111'};">
          ${isPremium ? 'PREMIUM REPORT' : 'BASIC REPORT'}
        </span>
      </div>

      <div>
        <div class="reg">${data.reg}</div>

      <div class="sub">
      ${data.vehicle?.make || "N/A"} ${data.vehicle?.model || ""}
    </div>

    ${getLogo(data.make) ? `
      <img src="${getLogo(data.make)}"
           style="height:35px; margin-top:5px;">
    ` : ""}

    <div class="sub">
   ${data.vehicle?.fuel || "N/A"} • ${data.vehicle?.colour || "N/A"} • ${data.vehicle?.year || "N/A"}
    </div>

    ${data.image ? `
      <img src="${data.image}"
           style="width:100%; margin-top:10px; border-radius:12px;">
    ` : ""}
    </div>

    ${data.fallback ? `
      <div style="background:#fef3c7; padding:12px; border-radius:10px; margin-top:15px;">
      ⚠ Some data unavailable — please try again or upgrade for full checks
    </div>
    ` : ""}

    <div style="text-align:right;">
    <div class="risk-score">${data.riskScore}</div>

    <div class="badge ${riskClass}">
      ${riskText}
    </div>

    <div style="margin-top:10px; font-size:13px; color:#6b7280;">
      Risk Assessment
    </div>
  </div>

  </div>

  <div class="section card" style="border-left:5px solid ${riskClass === 'high' ? 'red' : riskClass === 'medium' ? 'orange' : '#16a34a'};">
  <h3>🚨 Risk Summary</h3>

  <p>
    ${
      data.riskScore > 60
        ? "High risk vehicle — caution advised before purchase"
        : data.riskScore > 30
        ? "Moderate risk — review details carefully"
        : "Low risk — no major issues detected"
    }
  </p>
  </div>

  <div class="section card" style="background:#f9fafb;">
  <h3>🧠 What this means</h3>

  <div style="margin-top:10px;">
    ${
      data.riskScore > 60
        ? "❗ This vehicle may have serious underlying issues. Strongly consider a full inspection before purchase."
        : data.riskScore > 30
        ? "⚠ Some risk indicators found. Check details carefully before making a decision."
        : "✅ This vehicle shows no major red flags based on available data."
    }
  </div>
</div>

      <div class="section card">
        <h3>Vehicle Details</h3>
        <div class="grid">
          ${info("Make", data.vehicle?.make)}
          ${info("Model", data.vehicle?.model)}
          ${info("Fuel", data.vehicle?.fuel)}
          ${info("Colour", data.vehicle?.colour)}
          ${info("Year", data.vehicle?.year)}
          ${info("Mileage", data.mileage?.current ? data.mileage.current + " miles" : "N/A")}
        </div>
      </div>

      <div class="section card">
  <h3>Critical Checks</h3>

  // 🔒 BASIC MODE CONTROL (ADD ABOVE CHECKS)
  const showPremiumData = isPremium;
  <div class="grid">
    ${data.finance === "unknown"
  ? locked("Finance")
  : status("Finance", data.finance !== "outstanding")}

  ${data.finance === "unknown"
  ? locked("Stolen")
  : status("Stolen", data.stolen !== "yes")}

  ${data.finance === "unknown"
  ? locked("Write-off")
  : status("Write-off", data.writeOff !== "yes")}

    ${status("MOT", data.motValid)}
    ${status("Tax", data.taxValid)}
  </div>
</div>

${!isPremium ? `
<div class="section card" style="text-align:center; border:2px dashed #e5e7eb;">
  
  <h3>🔒 Unlock Full Vehicle History</h3>

  <p style="color:#6b7280; margin-top:10px;">
    Finance records, theft checks, and write-off history are hidden
  </p>

  <button class="btn" onclick="window.location.href='pricing.html'" 
          style="margin-top:15px; width:100%;">
    Upgrade to Premium
  </button>

</div>
` : ""}

<div class="section card">
  <h3>💰 Market Valuation</h3>

  <div class="value-box">£${data.estimatedValue || "N/A"}</div>

  <div class="insight">
    This estimate is based on mileage, age, and market trends
  </div>
</div>

<div class="section card">
  <h3>🧠 Smart Insights</h3>

  ${
    data.insights?.length
      ? data.insights.map(i => `<div class="insight">• ${i}</div>`).join("")
      : "<p>No major issues detected</p>"
  }
</div>

      <div class="section card">
        <h3>Risk Summary</h3>
        <p><strong>Score:</strong> ${data.riskScore ?? 0}/100</p>
        <p><strong>Assessment:</strong> ${riskText}</p>
      </div>

      <div class="section card">
        <h3>Estimated Value</h3>
        <div class="value-box">£${data.estimatedValue || "N/A"}</div>
      </div>

      <div class="section card">
        <h3>Summary Insights</h3>
        ${
          data.insights?.length
            ? data.insights.map(i => `<div class="insight">• ${i}</div>`).join("")
            : "<p>No insights available</p>"
        }
      </div>

  <button class="btn" onclick="downloadPDF()" style="margin-top:20px; width:100%; font-weight:bold; font-size:17px; box-shadow:0 10px 20px rgba(0,0,0,0.1);">
  📄 Download Official Vehicle Report (PDF)
</button>

`;

  } 
  catch (err) {
  console.error("❌ ERROR IN LOAD REPORT:", err); // ✅ ADD THIS

    const reportEl = document.getElementById("report");
    if (reportEl) {
      reportEl.innerHTML = "❌ Server error";
    }
  }
}

/* DOWNLOAD PDF */
async function downloadPDF() {
  const reg = globalReg;

  if (!reg) {
    alert("Missing registration");
    return;
  }

  const res = await fetch(`${API}/vehicle/pdf`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ registration: reg })
  });

  if (!res.ok) {
    alert("Failed to generate PDF");
    return;
  }

  const blob = await res.blob();
  const url = window.URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = `${reg}-report.pdf`;
  a.click();
}

/* HELPERS */
function info(label, value) {
  return `
    <div class="small-card">
      <div style="color:#6b7280;">${label}</div>
      <div style="font-weight:bold;">${value || "N/A"}</div>
    </div>
  `;
}

function status(label, ok) {
  return `
    <div class="small-card">
      <div style="color:#6b7280;">${label}</div>
      <div style="font-weight:bold; color:${ok ? "#16a34a" : "red"};">
        ${ok ? "✔ Clear" : "⚠ Issue"}
      </div>
    </div>
  `;
}

// 🔒 PREMIUM LOCKED UI (ADD ONLY)
function locked(label) {
  return `
    <div class="small-card" style="background:#f9fafb; border:1px dashed #d1d5db;">
      <div style="color:#6b7280;">${label}</div>
      <div style="font-weight:bold; color:#9ca3af;">
        🔒 Premium only
      </div>
    </div>
  `;
}

// ✅ MOVED OUTSIDE (FIXED)
function getLogo(make) {
  const logos = {
    "FORD": "https://logo.clearbit.com/ford.com",
    "VAUXHALL": "https://logo.clearbit.com/vauxhall.co.uk",
    "BMW": "https://logo.clearbit.com/bmw.com",
    "AUDI": "https://logo.clearbit.com/audi.com",
    "MERCEDES": "https://logo.clearbit.com/mercedes-benz.com",
  };

  return logos[make?.toUpperCase()] || "";
}

/* ✅ IMPORTANT FIX: WAIT FOR DOM */
document.addEventListener("DOMContentLoaded", () => {
  loadReport();
});
</script>
</body>
</html>
