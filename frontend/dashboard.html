<!DOCTYPE html>
<html>
<head>
  <title>My Reports</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family: Arial, sans-serif;
      background:#f9fafb;
      color:#111827;
    }

    .nav {
      padding:20px;
      background:white;
      border-bottom:1px solid #e5e7eb;
    }

    .container {
      max-width:1000px;
      margin:auto;
      padding:30px 20px;
    }

    .card {
      background:white;
      border:1px solid #e5e7eb;
      padding:20px;
      border-radius:12px;
      margin-bottom:15px;
      cursor:pointer;
      transition:0.2s;
    }

    .card:hover {
      transform:translateY(-3px);
      box-shadow:0 10px 20px rgba(0,0,0,0.05);
    }

    .top {
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .risk {
      font-weight:bold;
      padding:5px 10px;
      border-radius:8px;
      font-size:12px;
    }

    .low { background:#dcfce7; color:#166534; }
    .medium { background:#fef9c3; color:#854d0e; }
    .high { background:#fee2e2; color:#991b1b; }

    .btn {
      margin-top:20px;
      padding:10px;
      width:100%;
      border:none;
      border-radius:8px;
      background:#16a34a;
      color:white;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div class="nav">
  <h2>📊 My Vehicle Reports</h2>
</div>

<div class="container">
  <div id="list">Loading...</div>
</div>

<script>
const API = "https://vehicle-history-backend-production.up.railway.app";

async function loadReports() {
  try {
    const res = await fetch(API + "/vehicle/reports");
    const data = await res.json();

    if (!data.length) {
      document.getElementById("list").innerHTML = `
        <p>No reports yet</p>
        <button class="btn" onclick="goHome()">Check a vehicle</button>
      `;
      return;
    }

    document.getElementById("list").innerHTML = data.map(r => {

      let riskClass = "low";
      if (r.riskScore > 60) riskClass = "high";
      else if (r.riskScore > 30) riskClass = "medium";

      return `
        <div class="card" onclick="openReport('${r.reg}')">

          <div class="top">
            <div>
              <h3>${r.make} ${r.model}</h3>
              <div style="color:#6b7280;">${r.reg}</div>
            </div>

            <div class="risk ${riskClass}">
              ${r.riskScore}/100
            </div>
          </div>

          <div style="margin-top:10px; font-size:14px; color:#6b7280;">
            ${new Date(r.createdAt).toLocaleDateString()}
          </div>

        </div>
      `;
    }).join("");

  } catch {
    document.getElementById("list").innerHTML = "❌ Failed to load reports";
  }
}

function openReport(reg) {
  window.location.href = "/success.html?reg=" + reg;
}

function goHome() {
  window.location.href = "/";
}

loadReports();
</script>

</body>
</html>
