<!DOCTYPE html>
<html>
<head>
  <title>Vehicle Report</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin:0;
      font-family: Arial, sans-serif;
      background:#ffffff;
      color:#111827;
    }

    /* NAVBAR */
    .nav {
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:15px 25px;
      border-bottom:1px solid #e5e7eb;
      background:white;
      position:sticky;
      top:0;
      z-index:1000;
    }

    .nav img {
      height:45px;
    }

    .nav-links {
      display:flex;
      gap:20px;
    }

    .nav-links a {
      text-decoration:none;
      color:#6b7280;
      font-size:14px;
    }

    .nav-links a:hover {
      color:#16a34a;
    }

    .cta {
      background:#16a34a;
      color:white !important;
      padding:8px 14px;
      border-radius:8px;
    }

    /* MOBILE */
    .menu-btn {
      display:none;
      font-size:22px;
      cursor:pointer;
    }

    @media(max-width:768px) {
      .nav-links {
        display:none;
        flex-direction:column;
        position:absolute;
        top:60px;
        right:20px;
        background:white;
        border:1px solid #e5e7eb;
        padding:15px;
        border-radius:10px;
      }

      .nav-links.show {
        display:flex;
      }

      .menu-btn {
        display:block;
      }
    }

    /* MAIN */
    .container {
      max-width:900px;
      margin:auto;
      padding:30px 20px;
    }

    .card {
      background:white;
      border:1px solid #e5e7eb;
      padding:25px;
      border-radius:16px;
    }

    .grid {
      display:flex;
      gap:20px;
      flex-wrap:wrap;
      margin-top:20px;
    }

    .col {
      flex:1;
      min-width:250px;
    }

    .row {
      display:flex;
      justify-content:space-between;
      padding:12px;
      background:#f9fafb;
      border-radius:8px;
      margin-bottom:8px;
    }

    .btn {
      background:#16a34a;
      color:white;
      border:none;
      padding:15px;
      border-radius:10px;
      font-weight:bold;
      cursor:pointer;
      width:100%;
      margin-top:20px;
    }

    .btn:hover {
      background:#15803d;
    }

    .alert-red {
      margin-top:20px;
      padding:15px;
      background:#fee2e2;
      border-radius:10px;
      color:#b91c1c;
      font-weight:bold;
      text-align:center;
    }

    .alert-yellow {
      margin-top:15px;
      padding:15px;
      background:#fef9c3;
      border-radius:10px;
    }

    .footer {
  background:#f9fafb; /* light grey like Apple */
  color:#6b7280;
  padding:60px 40px;
  margin-top:60px;
  border-top:1px solid #e5e7eb;
}
  </style>
</head>
<body>
<!-- NAVBAR -->
<div class="nav">
  <a href="index.html">
    <img src="./mylogo/logo.png" style="height:90px;">
  </a>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <div class="nav-links" id="menu">
    <a href="index.html">Home</a>
    <a href="pricing.html">Pricing</a>
    <a href="contact.html">Contact</a>
    <a href="check.html" class="cta">Check Vehicle</a>
  </div>
</div>
<div class="container">
  <div id="content">Loading...</div>
</div>
<script>
const API = "https://vehicle-history-backend-production.up.railway.app";

const urlParams = new URLSearchParams(window.location.search);
const reg = urlParams.get("reg");

/* MOBILE MENU */
function toggleMenu() {
  document.getElementById("menu").classList.toggle("show");
}

async function loadData() {

  if (!reg) {
    document.getElementById("content").innerHTML = "❌ No registration provided";
    return;
  }

  try {
    const res = await fetch(`${API}/vehicle/preview`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ registration: reg })
    });

    const data = await res.json();

    if (data.error) {
      document.getElementById("content").innerHTML = "Invalid registration";
      return;
    }

    document.getElementById("content").innerHTML = `
      
      <div class="card">

        <!-- HEADER -->
        <div style="display:flex; justify-content:space-between; flex-wrap:wrap;">

          <div>
            <div style="color:#16a34a; font-weight:bold;">${data.make}</div>
            <h2 style="margin:5px 0;">
              ${data.make} (${data.year})
            </h2>
            <div style="color:#6b7280; font-size:14px;">
              Report Date: ${new Date().toLocaleDateString()}
            </div>
          </div>

          <button onclick="upgrade()" class="btn" style="width:auto;">
            Download Full Report
          </button>

        </div>

        <!-- GRID -->
        <div class="grid">

          <div class="col">
            ${row("Registration", reg)}
            ${row("Make", data.make)}
            ${row("Year", data.year)}
            ${row("Fuel", data.fuel)}
            ${row("Colour", data.colour)}
            ${row("MOT Status", data.motStatus)}
          </div>

          <div class="col" style="
            display:flex;
            align-items:center;
            justify-content:center;
          ">
            <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70"
              style="max-width:100%; border-radius:10px;" />
          </div>

        </div>

        <!-- ALERT -->
        <div class="alert-red">
          🚨 1 potential issue detected
        </div>

        <div class="alert-yellow">
          ⚠️ Full report includes:
          <ul>
            <li>Outstanding Finance</li>
            <li>Stolen Vehicle Check</li>
            <li>Write-off History</li>
          </ul>
        </div>

        <!-- CTA -->
        <button onclick="upgrade()" class="btn">
          🔓 Unlock Full Report (£4.99)
        </button>

      </div>
    `;

  } catch {
    document.getElementById("content").innerHTML = "Server error";
  }
}

function upgrade() {
  if (!reg) {
    alert("Registration missing");
    window.location.href = "/index.html";
    return;
  }

  window.location.href = `/check.html?reg=${reg}`;
}

function row(label, value) {
  return `
    <div class="row">
      <span>${label}</span>
      <strong>${value}</strong>
    </div>
  `;
}

loadData();
</script>
<!-- FOOTER -->
<style>

  height:100%;
}

body {
  display:flex;
  flex-direction:column;
}

/* MAIN CONTENT WRAPPER */
.container {
  flex:1;
}

/* FOOTER */
.footer {
  background:linear-gradient(to bottom, #ffffff, #f3f4f6);
  border-top:1px solid #e5e7eb;
  padding:30px 20px;
  font-size:14px;
}

/* FOOTER INNER */
.footer-inner {
  max-width:1100px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:20px;
  align-items:center;
}

/* LEFT */
.footer-left {
  font-weight:600;
  color:#111827;
}

/* LINKS */
.footer-links {
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.footer-links a {
  color:#6b7280;
  text-decoration:none;
}

.footer-links a:hover {
  color:#16a34a;
}

/* BADGES */
.footer-badges {
  font-size:12px;

/* MOBILE */
@media(max-width:768px){
  .footer-inner {
    flex-direction:column;
    text-align:center;
  }

</style>
<!-- FOOTER -->
<div class="footer">
  <div class="footer-inner">

<div class="footer-left">

</div>

<!-- LINKS -->

</div>
