</div>

<script>
const API = window.location.hostname === "localhost"
  ? "http://localhost:3001"
  : "https://vehicle-history-backend-production.up.railway.app";

const params    = new URLSearchParams(window.location.search);
const sessionId = params.get("session_id");
const root      = document.getElementById("pageRoot");
let   globalReg = null;

/* ── SVG icons ── */
const ICO = {
  check:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>`,
  warn:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
  info:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
  lock:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>`,
  mot:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>`,
  people: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
  dl:     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,
  search: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`,
};

/* ── Helpers ── */
function s(x)    { return (x !== null && x !== undefined && x !== '') ? String(x) : null; }
function show(x) { return s(x) || 'N/A'; }
function fmtDate(d) {
  if(!d) return 'N/A';
  try { return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); }
  catch(e){ return String(d); }
}
function motPill(st){
  if(!st) return 'chip-s';
  const l = st.toLowerCase();
  if(l.includes('valid')||l.includes('pass')) return 'chip-g';
  if(l.includes('expired')||l.includes('fail')||l.includes('no detail')) return 'chip-r';
  return 'chip-a';
}
function taxPill(st){
  if(!st) return 'chip-s';
  const l = st.toLowerCase();
  if(l.includes('taxed')&&!l.includes('untaxed')) return 'chip-g';
  if(l.includes('untaxed')||l.includes('sorn')) return 'chip-r';
  return 'chip-a';
}
function pillColour(cls){
  if(cls==='chip-g') return 'var(--green)';
  if(cls==='chip-r') return 'var(--red)';
  if(cls==='chip-a') return 'var(--amber)';
  return 'var(--sub)';
}
function dr(label, val, pillCls, rowCls) {
  const extra = rowCls ? ` ${rowCls}` : '';
  const vHtml = pillCls
    ? `<span class="chip ${pillCls}">${val}</span>`
    : `<span class="dr-r">${val}</span>`;
  return `<div class="dr${extra}"><span class="dr-l">${label}</span>${vHtml}</div>`;
}

/* ── Normalise backend response ── */
function normalise(raw, fallbackReg) {
  if(!raw) return null;
  const rcc = raw.rcc || raw;
  const src = raw.vehicle || raw;

  if(rcc.Results && rcc.Results.InitialVehicleCheckModel) {
    const m = rcc.Results.InitialVehicleCheckModel;
    const b  = m.BasicVehicleDetailsModel || {};
    const ms = b.MotResultsSummary || m.MotResultsSummary || {};
    const eng = parseInt(String(b.CylinderCapacity||'').replace(/[^\d]/g,'')) || null;
    return {
      registrationNumber: rcc.Results.Vrm || fallbackReg,
      make:  b.Make || ms.MotVehicleManufacturer,
      model: b.Model || ms.MotVehicleModel,
      colour: b.Colour || b.OriginalColour,
      yearOfManufacture: b.YearOfManufacture,
      engineCapacity: eng,
      fuelType: b.FuelType || ms.MotVehicleFuelType,
      co2Emissions: b.Co2Emissions,
      motStatus: b.MotStatusDescription || m.MotStatusDescription,
      taxStatus: b.RoadTaxStatusDescription || m.RoadTaxStatusDescription,
      taxDueDate: b.DateRoadTaxDue,
      artEndDate: b.DateMotDue,
      motDaysLeft: b.DaysLeftUntilMotDue,
      taxDaysLeft: b.DaysLeftUntilRoadTaxDue,
      dateOfLastV5CIssued: b.DateOfLastV5CIssued,
      monthOfFirstRegistration: b.DateOfFirstRegistration,
      euroStatus: b.EuroStatus,
      typeApproval: b.TypeApproval,
      wheelplan: b.WheelPlan,
      bodyStyle: b.BodyStyle,
      markedForExport: b.Exported || false,
      isScrapped: b.IsScrapped || false,
      keeperHistory: raw.keeperHistory || b.KeeperHistory || m.KeeperHistory || [],
      motResults: raw.motHistory || ms.MotResults || m.MotResults || raw.motResults || [],
      taxBand: m.RoadTaxData && m.RoadTaxData.Band,
      taxAnnualRate: m.RoadTaxData && m.RoadTaxData.TwelveMonthRate,
      averageMileage: b.AverageMileage,
      revenueWeight: b.RevenueWeight,
      colourChanges: b.ColourChangesQuantity || 0,
      isImported: b.IsImported || false,
      isNonEuImport: b.IsNonEuImport || false,
      isSORN: b.IsVehicleSORN || false,
      finance:        raw.finance,
      stolen:         raw.stolen,
      writeOff:       raw.writeOff,
      riskScore:      raw.riskScore,
      insights:       raw.insights,
      pnc:            raw.pnc            || null,
      miaftr:         raw.miaftr         || null,
      financeDetails: raw.financeDetails || null,
      vdg:            raw.vdg            || null,
    };
  }

  return {
    registrationNumber: src.registrationNumber || src.reg || fallbackReg,
    make: src.make, model: src.model, colour: src.colour,
    yearOfManufacture: src.yearOfManufacture || src.year,
    engineCapacity: src.engineCapacity,
    fuelType: src.fuelType || src.fuel, co2Emissions: src.co2Emissions || src.co2,
    motStatus: src.motStatus, taxStatus: src.taxStatus,
    taxDueDate: src.taxDueDate || src.taxDue, artEndDate: src.artEndDate,
    motDaysLeft: src.motDaysLeft, taxDaysLeft: src.taxDaysLeft,
    dateOfLastV5CIssued: src.dateOfLastV5CIssued,
    monthOfFirstRegistration: src.monthOfFirstRegistration,
    euroStatus: src.euroStatus, typeApproval: src.typeApproval,
    wheelplan: src.wheelplan || src.wheelPlan, bodyStyle: src.bodyStyle,
    markedForExport: src.markedForExport || false,
    isScrapped: src.isScrapped || false,
    keeperHistory: src.keeperHistory || raw.keeperHistory || [],
    motResults: src.motHistory || src.motResults || raw.motHistory || [],
    taxBand: src.taxBand, taxAnnualRate: src.taxAnnualRate,
    averageMileage: src.averageMileage, revenueWeight: src.revenueWeight,
    colourChanges: src.colourChanges || 0, isImported: src.isImported || false,
    finance: raw.finance, stolen: raw.stolen, writeOff: raw.writeOff,
    riskScore: raw.riskScore, insights: raw.insights,

    // ✅ VDG premium fields (from vehicle.service.ts)
pnc:            raw.pnc            || null,
miaftr:         raw.miaftr         || null,
financeDetails: raw.financeDetails || null,
vdg:            raw.vdg            || null,

finance:        raw.finance,
stolen:         raw.stolen,
writeOff:       raw.writeOff,
riskScore:      raw.riskScore,
insights:       raw.insights,
  };
}

/* ── Risk ring ── */
function renderBuyerVerdictHTML(bv) {
  if (!bv) return '';

  const verdictMap = {
    SAFE_BUY:  { label: 'SAFE BUY',  fg: '#16a34a', soft: '#dcfce7' },
    CAUTION:   { label: 'CAUTION',   fg: '#d97706', soft: '#fef3c7' },
    HIGH_RISK: { label: 'HIGH RISK', fg: '#dc2626', soft: '#fee2e2' }
  };
  const m = verdictMap[bv.verdict];
  if (!m) return '';

  const headline = bv.headline || '';
  const watchOuts = Array.isArray(bv.watchOuts) ? bv.watchOuts : [];
  const pros = Array.isArray(bv.pros) ? bv.pros : [];
  const action = bv.action || '';

  const esc = (str) => String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');

  return `
    <div class="ic" style="border-left:4px solid ${m.fg};margin-bottom:14px;padding:20px 24px;animation-delay:.06s">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap">
        <span style="display:inline-block;padding:6px 14px;border-radius:14px;background:${m.soft};color:${m.fg};font-weight:700;font-size:11px;letter-spacing:1.2px">${m.label}</span>
        ${headline ? `<span style="font-size:15px;color:var(--text);font-weight:500">${esc(headline)}</span>` : ''}
      </div>
      ${pros.length || watchOuts.length ? `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:8px">
        ${pros.length ? `
        <div>
          <div style="font-size:12px;font-weight:600;color:#16a34a;margin-bottom:8px;letter-spacing:.5px">WHAT LOOKS GOOD</div>
          <ul style="margin:0;padding:0;list-style:none">
            ${pros.map(p => `<li style="font-size:13px;color:var(--text);padding:4px 0 4px 18px;position:relative;line-height:1.5"><span style="position:absolute;left:0;color:#16a34a;font-weight:700">•</span>${esc(p)}</li>`).join('')}
          </ul>
        </div>` : '<div></div>'}
        ${watchOuts.length ? `
        <div>
          <div style="font-size:12px;font-weight:600;color:#dc2626;margin-bottom:8px;letter-spacing:.5px">WATCH-OUTS</div>
          <ul style="margin:0;padding:0;list-style:none">
            ${watchOuts.map(w => `<li style="font-size:13px;color:var(--text);padding:4px 0 4px 18px;position:relative;line-height:1.5"><span style="position:absolute;left:0;color:#dc2626;font-weight:700">•</span>${esc(w)}</li>`).join('')}
          </ul>
        </div>` : '<div></div>'}
      </div>` : ''}
      ${action ? `
      <div style="margin-top:18px;padding-top:14px;border-top:1px solid var(--border)">
        <div style="font-size:11px;color:var(--text);opacity:0.65;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-weight:600">Recommended action</div>
        <div style="font-size:14px;color:var(--text);font-weight:500">${esc(action)}</div>
      </div>` : ''}
    </div>
  `;
}

function riskRing(score) {
  const n = parseInt(score) || 0;
  const r = 35, circ = 2*Math.PI*r;
  const colour  = n<=30 ? 'var(--green)' : n<=60 ? 'var(--amber)' : 'var(--red)';
  const label   = n<=30 ? 'Low Risk'     : n<=60 ? 'Medium Risk'  : 'High Risk';
  const chipCls = n<=30 ? 'chip-g'       : n<=60 ? 'chip-a'       : 'chip-r';
  return { colour, label, chipCls, n,
    html:`<div class="ring-wrap">
      <svg class="ring-svg" viewBox="0 0 84 84">
        <circle class="ring-bg" cx="42" cy="42" r="${r}"/>
        <circle class="ring-bar" cx="42" cy="42" r="${r}"
          stroke="${colour}" stroke-dasharray="${circ}"
          stroke-dashoffset="${circ*(1-Math.min(n,100)/100)}"/>
      </svg>
      <div class="ring-num" style="color:${colour}">${n}</div>
    </div>`
  };
}

/* ── MOT timeline ── */
function motTimeline(tests) {
  if(!tests||!tests.length) return `<div class="dr" style="padding:16px 20px"><span class="dr-l">No MOT records found</span></div>`;
  return `<div class="mot-timeline">${tests.slice(0,10).map(t => {
    const date   = fmtDate(t.DateOfTest||t.date);
    const passed = t.ResultText||(t.Result===true?'PASS':'FAIL');
    const isPass = String(passed).toLowerCase().includes('pass');
    const miles  = t.OdometerModel?.OdometerReading || t.mileage || null;
    const expiry = t.TestExpiryDate ? fmtDate(t.TestExpiryDate) : null;
    const adv    = t.AdvisoryNotices_V2||t.AdvisoryNotices||[];
    const fails  = t.RefusalReasons_V2||t.RefusalReasons||[];
    const advHtml = adv.length ? `
      <button class="mot-adv-toggle" onclick="var d=this.nextElementSibling;d.classList.toggle('open');this.textContent=d.classList.contains('open')?'▲ Hide':'▼ ${adv.length} advisor${adv.length>1?'ies':'y'}">▼ ${adv.length} advisor${adv.length>1?'ies':'y'}</button>
      <div class="mot-advisories">${adv.map(a=>`<div class="mot-adv-item">• ${(a.Text||a.text||String(a)).replace(/\(.*?\)/g,'')}</div>`).join('')}</div>` : '';
    const failHtml = fails.length ? `
      <button class="mot-fail-toggle" onclick="var d=this.nextElementSibling;d.classList.toggle('open');this.textContent=d.classList.contains('open')?'▲ Hide failures':'▼ ${fails.length} failure items'">▼ ${fails.length} failure items</button>
      <div class="mot-failures">${fails.map(f=>`<div class="mot-fail-item">⚠ ${(f.Text||f.text||String(f)).replace(/\(.*?\)/g,'')}</div>`).join('')}</div>` : '';
    return `<div class="mot-entry">
      <div class="mot-dot ${isPass?'pass':'fail'}"></div>
      <div class="mot-info">
        <div class="mot-date">${date} — <span style="color:${isPass?'var(--green)':'var(--red)'};font-weight:800">${isPass?'PASS':'FAIL'}</span></div>
        ${expiry?`<div class="mot-expiry">Expires: ${expiry}</div>`:''}
        ${miles?`<div class="mot-miles">${Number(miles).toLocaleString()} miles</div>`:''}
        ${advHtml}${failHtml}
      </div>
    </div>`;
  }).join('')}</div>`;
}

/* ── Keeper history ── */
function keeperHist(keepers) {
  if(!keepers||!keepers.length) return `<div class="dr" style="padding:16px 20px"><span class="dr-l">No keeper records</span></div>`;
  return `<div class="ic-rows">${keepers.map((k,i)=>{
    const num  = k.NumberPreviousKeepers||(keepers.length-i);
    const date = fmtDate(k.DateOfLastKeeperChange||k.date);
    return `<div class="keeper-row">
      <div class="keeper-num">${num}</div>
      <div><div class="keeper-label">Keeper ${num}</div><div class="keeper-date">Transfer: ${date}</div></div>
    </div>`;
  }).join('')}</div>`;
}

/* ── Check cell ── */
function checkCell(label, status, note, isLocked) {
  if(isLocked) return `
    <div class="check-cell">
      <div class="cc-lbl">${label}</div>
      <div class="cc-box lock"><div class="cc-dot lock"></div><div class="cc-val lock">${ICO.lock} Locked</div></div>
      <div class="cc-note">Upgrade to unlock</div>
    </div>`;
  const norm = String(status||'').toLowerCase();
  const ok  = norm==='clear'||norm==='no'||norm==='false'||norm==='none';
  const unk = norm===''||norm==='unknown';
  const cls = ok?'pass':unk?'unknown':'fail';
  const txt = ok?'✓ Clear':unk?'? Unknown':'⚠ Issue found';
  return `
    <div class="check-cell">
      <div class="cc-lbl">${label}</div>
      <div class="cc-box ${cls}"><div class="cc-dot ${cls}"></div><div class="cc-val ${cls}">${txt}</div></div>
      ${note?`<div class="cc-note">${note}</div>`:''}
    </div>`;
}

function financeRecordsHtml(financeDetails) {
  const recs = financeDetails?.FinanceRecordList || [];
  if (!recs.length) return '<div class="dr" style="padding:14px 20px"><span class="dr-l">No finance records found</span></div>';
  return recs.map(r => `
    <div style="padding:14px 20px;border-bottom:1px solid var(--div)">
      <div class="dr" style="padding:0;border:none"><span class="dr-l">Agreement type</span><span class="dr-r">${r.AgreementType||'—'}</span></div>
      <div class="dr" style="padding:0;border:none"><span class="dr-l">Finance company</span><span class="dr-r">${r.FinanceCompany||'—'}</span></div>
      <div class="dr" style="padding:0;border:none"><span class="dr-l">Agreement date</span><span class="dr-r">${fmtDate(r.AgreementDate)}</span></div>
      <div class="dr" style="padding:0;border:none"><span class="dr-l">Term</span><span class="dr-r">${r.AgreementTerm ? r.AgreementTerm+' months' : '—'}</span></div>
    </div>`).join('');
}

function writeOffRecordsHtml(miaftr) {
  const recs = miaftr?.WriteOffRecordList || [];
  if (!recs.length) return '<div class="dr" style="padding:14px 20px"><span class="dr-l">No write-off records found</span></div>';
  return recs.map(r => `
    <div style="padding:14px 20px;border-bottom:1px solid var(--div)">
      <div class="dr" style="padding:0;border:none"><span class="dr-l">Loss date</span><span class="dr-r" style="color:var(--red);font-weight:700">${fmtDate(r.LossDate)}</span></div>
      <div class="dr" style="padding:0;border:none"><span class="dr-l">Category</span><span class="dr-r">${r.Category||'—'}</span></div>
      <div class="dr" style="padding:0;border:none"><span class="dr-l">Insurer</span><span class="dr-r">${r.InsuranceCompany||'—'}</span></div>
    </div>`).join('');
}

function pncDetailHtml(pnc) {
  if (!pnc) return '<div class="dr" style="padding:14px 20px"><span class="dr-l">No PNC data available</span></div>';
  return `
    <div class="ic-rows">
      ${dr('Stolen marker', pnc.IsStolen ? 'STOLEN' : 'Not stolen', pnc.IsStolen ? 'chip-r' : 'chip-g')}
      ${pnc.PncVehicleDescription ? dr('PNC description', pnc.PncVehicleDescription) : ''}
      ${pnc.PncCheckDate ? dr('Check date', fmtDate(pnc.PncCheckDate)) : ''}
    </div>`;
}

/* ── Mileage anomaly ── */
function mileageAnomaly(motResults) {
  if(!motResults||!motResults.length) return null;
  const pts = motResults
    .map(t=>({date:t.DateOfTest||t.date, miles:t.OdometerModel?.OdometerReading||t.mileage||0}))
    .filter(p=>p.miles>0).sort((a,b)=>new Date(a.date)-new Date(b.date));
  for(let i=1;i<pts.length;i++){
    if(pts[i].miles<pts[i-1].miles) return `Possible mileage rollback: ${pts[i-1].miles.toLocaleString()} → ${pts[i].miles.toLocaleString()} miles`;
    if(pts[i].miles-pts[i-1].miles>50000) return `Unusually high jump between tests: +${(pts[i].miles-pts[i-1].miles).toLocaleString()} miles`;
  }
  return null;
}

/* ── Recurring MOT issues (legacy — kept for compat) ── */
function recurringIssues(motResults) {
  const adv = (motResults||[]).flatMap(t=>t.AdvisoryNotices_V2||t.AdvisoryNotices||[]);
  const texts = adv.map(a=>(a.Text||a.text||String(a)).toLowerCase());
  const issues = [];
  if(texts.some(t=>t.includes('tyre')))          issues.push('Repeated tyre advisories');
  if(texts.some(t=>t.includes('corrod')))         issues.push('Corrosion advisories found');
  if(texts.some(t=>t.includes('suspension')))     issues.push('Suspension advisories');
  if(texts.some(t=>t.includes('shock absorber'))) issues.push('Shock absorber wear');
  if(texts.some(t=>t.includes('sub-frame')))      issues.push('Subframe wear detected');
  if(texts.some(t=>t.includes('brake')))          issues.push('Brake-related advisories');
  return issues;
}

/* ══════════════════════════════════════
   ENRICHED FINDINGS ENGINE
══════════════════════════════════════ */
function buildFindings(v, rawData) {
  const findings = [];
  const motResults = (v.motResults || []).slice().sort((a,b) => new Date(a.DateOfTest||a.date) - new Date(b.DateOfTest||b.date));

  // Helper: given a category keyword regex, return { count, years, mostRecent }
  function categoryHits(keywords){
    let count = 0;
    const yearsSet = new Set();
    let mostRecent = null;
    motResults.forEach(t=>{
      const adv = t.AdvisoryNotices_V2 || t.AdvisoryNotices || [];
      const matched = adv.filter(a => {
        const txt = (a.Text||a.text||String(a)).toLowerCase();
        return keywords.some(k => txt.includes(k));
      });
      if(matched.length){
        count += matched.length;
        const d = new Date(t.DateOfTest||t.date);
        if(!isNaN(d.getTime())){
          yearsSet.add(d.getFullYear());
          if(!mostRecent || d > mostRecent) mostRecent = d;
        }
      }
    });
    const years = Array.from(yearsSet).sort();
    return { count, yearCount: years.length, firstYear: years[0], lastYear: years[years.length-1], mostRecent };
  }

  // ── 1. WRITE-OFF (Critical) ──
  const isWriteOff = (rawData?.writeOff && String(rawData.writeOff).toLowerCase()!=='clear' && String(rawData.writeOff).toLowerCase()!=='no')
                  || (rawData?.miaftr?.WriteOffRecordList?.length > 0);
  if(isWriteOff){
    const recs = rawData?.miaftr?.WriteOffRecordList || [];
    const cat = recs[0]?.Category;
    const lossDate = recs[0]?.LossDate ? fmtDate(recs[0].LossDate) : null;
    findings.push({
      severity:'crit', category:'Insurance',
      icon:ICO.warn,
      title:'Insurance write-off recorded',
      desc:`This vehicle has been recorded as a write-off${cat?` (Category ${cat})`:''}${lossDate?` on ${lossDate}`:''}. Insurer deemed it uneconomical to repair after damage. Repaired write-offs can be legally driven but typically lose 20–40% of resale value and may have hidden structural damage.`,
      evidence: lossDate ? `Loss date: ${lossDate}` : `Recorded in MIAFTR insurance database`,
      recco: 'Strongly consider an independent inspection before buying.',
    });
  }

  // ── 2. STOLEN MARKER (Critical) ──
  const isStolen = (rawData?.stolen && String(rawData.stolen).toLowerCase()!=='clear' && String(rawData.stolen).toLowerCase()!=='no')
                || (rawData?.pnc?.IsStolen === true);
  if(isStolen){
    findings.push({
      severity:'crit', category:'Theft',
      icon:ICO.warn,
      title:'Stolen vehicle marker active',
      desc:`This registration is flagged on the Police National Computer as stolen. Buying a stolen vehicle means you have no legal right to it — police can seize it from you with no compensation. Do not proceed with this purchase.`,
      evidence:'Source: Police National Computer (PNC)',
      recco:'Do not purchase. Report the listing to your local police.',
    });
  }

  // ── 3. OUTSTANDING FINANCE (Critical) ──
  const hasFinance = (rawData?.finance && String(rawData.finance).toLowerCase()!=='clear' && String(rawData.finance).toLowerCase()!=='no')
                  || (rawData?.financeDetails?.FinanceRecordList?.length > 0);
  if(hasFinance){
    const recs = rawData?.financeDetails?.FinanceRecordList || [];
    const company = recs[0]?.FinanceCompany;
    const agType = recs[0]?.AgreementType;
    findings.push({
      severity:'crit', category:'Finance',
      icon:ICO.warn,
      title:'Outstanding finance agreement',
      desc:`This vehicle still has an active finance agreement${company?` with ${company}`:''}${agType?` (${agType})`:''}. Until the loan is settled, the lender legally owns the vehicle and can repossess it from you — even if you bought it in good faith.`,
      evidence:'Source: Experian HPI database',
      recco:'Consider asking the seller for written settlement confirmation before paying.',
    });
  }

  // ── 4. MILEAGE ANOMALY (Critical or High) ──
  const milePts = motResults
    .map(t=>({date:new Date(t.DateOfTest||t.date), miles:parseInt(t.OdometerModel?.OdometerReading||t.mileage||0)}))
    .filter(p=>p.miles>0 && !isNaN(p.date.getTime()));
  for(let i=1;i<milePts.length;i++){
    if(milePts[i].miles < milePts[i-1].miles){
      findings.push({
        severity:'crit', category:'Mileage',
        icon:ICO.warn,
        title:'Possible mileage rollback detected',
        desc:`Recorded mileage dropped from ${milePts[i-1].miles.toLocaleString()} to ${milePts[i].miles.toLocaleString()} between ${milePts[i-1].date.toLocaleDateString('en-GB',{month:'short',year:'numeric'})} and ${milePts[i].date.toLocaleDateString('en-GB',{month:'short',year:'numeric'})}. Mileage should only ever go up. A drop suggests odometer tampering or a clerical error — both reduce the vehicle's value.`,
        evidence:`MOT records ${milePts[i-1].date.getFullYear()} → ${milePts[i].date.getFullYear()}`,
        recco:'Consider raising this with the seller and asking for written explanation.',
      });
      break;
    }
    if(milePts[i].miles - milePts[i-1].miles > 50000){
      findings.push({
        severity:'high', category:'Mileage',
        icon:ICO.warn,
        title:'Unusually high mileage jump',
        desc:`Mileage jumped by ${(milePts[i].miles-milePts[i-1].miles).toLocaleString()} miles between consecutive MOTs. While not impossible, jumps over 50,000 miles in a single year are uncommon and warrant questions about how the vehicle was used.`,
        evidence:`Between ${milePts[i-1].date.toLocaleDateString('en-GB',{month:'short',year:'numeric'})} and ${milePts[i].date.toLocaleDateString('en-GB',{month:'short',year:'numeric'})}`,
        recco:'Consider asking the seller about heavy commercial or trade use.',
      });
      break;
    }
  }

  // ── 5. SCRAPPED ──
  if(v.isScrapped){
    findings.push({
      severity:'crit', category:'Status',
      icon:ICO.warn,
      title:'Vehicle marked as scrapped',
      desc:`DVLA records show this vehicle has been scrapped. It is not currently legal to use this vehicle on UK roads. If the seller is presenting it for sale, they may be unaware or misrepresenting the status.`,
      evidence:'Source: DVLA',
      recco:'Do not purchase for road use.',
    });
  }

  // ── 6. EXPORT MARKER ──
  if(v.markedForExport){
    findings.push({
      severity:'high', category:'Status',
      icon:ICO.warn,
      title:'Marked for export',
      desc:`DVLA records show this vehicle has been notified for export from the UK. If sold to you in the UK, the V5C export marker may complicate re-registration and resale.`,
      evidence:'Source: DVLA',
      recco:'Consider asking the seller for the V5C and the reason for the export marker.',
    });
  }

  // ── 7. MOT FAILURES PATTERN ──
  const totalTests = motResults.length;
  const totalFails = motResults.filter(t => {
    const r = t.ResultText || (t.Result===true?'PASS':'FAIL');
    return !String(r).toLowerCase().includes('pass');
  }).length;
  if(totalTests>=3 && totalFails / totalTests >= 0.4){
    findings.push({
      severity:'high', category:'MOT history',
      icon:ICO.warn,
      title:'High MOT failure rate',
      desc:`This vehicle has failed ${totalFails} of its ${totalTests} recorded MOTs (${Math.round(totalFails/totalTests*100)}%). A consistent fail-rate above 40% suggests recurring mechanical issues that may continue under your ownership.`,
      evidence:`${totalFails} fails / ${totalTests} tests`,
      recco:'Consider reviewing failure reasons before purchase.',
    });
  }

  // ── 8. TYRE ADVISORIES (Medium, with cost) ──
  const tyre = categoryHits(['tyre','tire']);
  if(tyre.count >= 2){
    const yearRange = tyre.firstYear === tyre.lastYear ? `${tyre.firstYear}` : `${tyre.firstYear}–${tyre.lastYear}`;
    findings.push({
      severity:'med', category:'Mechanical',
      icon:ICO.warn,
      title:'Recurring tyre advisories',
      desc:`Tyre wear or condition was flagged ${tyre.count} times across ${tyre.yearCount} year${tyre.yearCount>1?'s':''} of MOTs. Repeated tyre advisories suggest the previous keeper deferred replacement, or there's an underlying alignment/suspension issue causing premature wear.`,
      evidence:`Flagged in MOTs ${yearRange}`,
      cost:'£80–£200 per tyre',
      recco:'Consider checking current tread depth and date code on all four tyres.',
    });
  }

  // ── 9. BRAKE ADVISORIES (High, with cost) ──
  const brake = categoryHits(['brake']);
  if(brake.count >= 1){
    const sev = brake.count >= 3 ? 'high' : 'med';
    const yearRange = brake.firstYear === brake.lastYear ? `${brake.firstYear}` : `${brake.firstYear}–${brake.lastYear}`;
    findings.push({
      severity:sev, category:'Safety',
      icon:ICO.warn,
      title:`Brake advisories ${brake.count>=3?'(recurring)':'recorded'}`,
      desc:`Brake-related issues were flagged ${brake.count} time${brake.count>1?'s':''}${brake.yearCount>1?` across ${brake.yearCount} years`:''}. Brakes are a safety-critical system. Even minor advisories can become MOT fails or roadside stops if neglected.`,
      evidence:`MOT ${yearRange}`,
      cost:'£150–£400 (pads + discs)',
      recco:'Consider asking when brakes were last replaced.',
    });
  }

  // ── 10. LIGHTING ADVISORIES (Low, with cost) ──
  const light = categoryHits(['lamp','headlamp','light','bulb']);
  if(light.count >= 2){
    findings.push({
      severity:'low', category:'Maintenance',
      icon:ICO.info,
      title:'Repeated lighting advisories',
      desc:`Lighting issues (bulbs, headlamp aim, lamp condition) were flagged ${light.count} times. These are typically inexpensive fixes but indicate the previous keeper deferred maintenance.`,
      evidence:`${light.yearCount} year${light.yearCount>1?'s':''} affected`,
      cost:'£10–£60 per bulb / £40 alignment',
      recco:'Easily checked at viewing — turn all lights on and walk around.',
    });
  }

  // ── 11. CORROSION ──
  const corr = categoryHits(['corrod','corrosion','rust']);
  if(corr.count >= 2){
    const sev = corr.count >= 4 ? 'high' : 'med';
    const yearRange = corr.firstYear === corr.lastYear ? `${corr.firstYear}` : `${corr.firstYear}–${corr.lastYear}`;
    findings.push({
      severity:sev, category:'Bodywork',
      icon:ICO.warn,
      title:`Corrosion flagged${corr.count>=4?' repeatedly':''}`,
      desc:`Corrosion was noted ${corr.count} times across ${corr.yearCount} year${corr.yearCount>1?'s':''} of MOTs. Surface rust is cosmetic but structural corrosion (subframe, sills, mounting points) can be expensive to remediate and is a future MOT risk.`,
      evidence:`MOT ${yearRange}`,
      recco:'Consider an underbody inspection before purchase.',
    });
  }

  // ── 12. SUSPENSION / SHOCK ──
  const susp = categoryHits(['suspension','shock absorber','strut','damper']);
  if(susp.count >= 2){
    findings.push({
      severity:'med', category:'Mechanical',
      icon:ICO.warn,
      title:'Suspension wear noted',
      desc:`Suspension or shock absorber wear was flagged ${susp.count} times. While normal with age and mileage, repeated mentions across years suggest deferred replacement.`,
      evidence:`${susp.yearCount} year${susp.yearCount>1?'s':''} affected`,
      recco:'Consider a test drive over rough surfaces to listen for knocks.',
    });
  }

  // ── 13. SUBFRAME ──
  const subframe = categoryHits(['sub-frame','subframe']);
  if(subframe.count >= 1){
    findings.push({
      severity:'high', category:'Structural',
      icon:ICO.warn,
      title:'Subframe wear detected',
      desc:`Subframe issues were flagged ${subframe.count} time${subframe.count>1?'s':''}. Subframes are structural components that can be costly to replace and may indicate the vehicle has been driven hard or hit something.`,
      evidence:`MOT ${subframe.firstYear}${subframe.firstYear!==subframe.lastYear?`–${subframe.lastYear}`:''}`,
      recco:'Consider having a mechanic inspect the subframe mounts.',
    });
  }

  // ── 14. HIGH KEEPER COUNT ──
  const keepers = (v.keeperHistory || []).length;
  if(keepers >= 6){
    findings.push({
      severity:'med', category:'Ownership',
      icon:ICO.info,
      title:'High keeper count',
      desc:`This vehicle has had ${keepers} previous keepers. While not inherently a problem, frequent ownership changes can indicate dissatisfaction, repeated minor issues, or trade ownership.`,
      evidence:`${keepers} keepers in DVLA records`,
      recco:'Consider asking the seller why each previous keeper sold on.',
    });
  }

  // ── 15. AI-GENERATED INSIGHTS from backend ──
  if(Array.isArray(v.insights)){
    v.insights.forEach(insRaw => {
      const ins = String(insRaw||'').trim();
      if(!ins) return;
      // Skip if already covered by structured detection above
      const lower = ins.toLowerCase();
      if(lower.includes('written off') && isWriteOff) return;
      if(lower.includes('stolen') && isStolen) return;
      if(lower.includes('finance') && hasFinance) return;
      if(lower.includes('mileage') && findings.some(f=>f.category==='Mileage')) return;
      findings.push({
        severity:'info', category:'Analysis',
        icon:ICO.info,
        title:ins.length>72?ins.slice(0,69)+'…':ins,
        desc:ins.length>72?ins:null,
        evidence:'Automated analysis',
      });
    });
  }

  // Severity ordering
  const order = {crit:0, high:1, med:2, low:3, info:4};
  findings.sort((a,b)=>order[a.severity]-order[b.severity]);

  // Summary counts
  const counts = {crit:0,high:0,med:0,low:0,info:0};
  findings.forEach(f=>counts[f.severity]++);

  return { findings, counts };
}

/* ══════════════════════════════════════
   FINDINGS PANEL RENDERER
══════════════════════════════════════ */
function renderFindingsPanel(v, rawData) {
  const { findings, counts } = buildFindings(v, rawData);
  const totalActionable = counts.crit + counts.high + counts.med;

  // Header summary
  const overallTone = counts.crit>0 ? 'critical' : counts.high>0 ? 'concerning' : counts.med>0 ? 'minor issues' : 'clean';
  const overallSubtitle = counts.crit>0
    ? 'Critical findings detected — review carefully before purchase.'
    : counts.high>0
      ? 'High-priority findings detected. Inspection recommended.'
      : counts.med>0
        ? 'Some minor findings to be aware of — overall reasonable condition.'
        : 'No major issues detected from automated analysis.';

  const summary = `<div class="findings-summary-strip">
    <div class="fs-cell">
      <div class="fs-lbl">Critical</div>
      <div class="fs-val ${counts.crit>0?'crit':'good'}">${counts.crit}</div>
      <div class="fs-sub ${counts.crit>0?'crit':''}">${counts.crit>0?'Take seriously':'None detected'}</div>
    </div>
    <div class="fs-cell">
      <div class="fs-lbl">High Priority</div>
      <div class="fs-val ${counts.high>0?'warn':'good'}">${counts.high}</div>
      <div class="fs-sub ${counts.high>0?'warn':''}">${counts.high>0?'Inspect carefully':'None'}</div>
    </div>
    <div class="fs-cell">
      <div class="fs-lbl">Minor</div>
      <div class="fs-val ${counts.med>0?'warn':'good'}">${counts.med}</div>
      <div class="fs-sub">${counts.med>0?'Worth noting':'None'}</div>
    </div>
    <div class="fs-cell">
      <div class="fs-lbl">Total Findings</div>
      <div class="fs-val">${findings.length}</div>
      <div class="fs-sub">across ${new Set(findings.map(f=>f.category)).size||0} categor${(new Set(findings.map(f=>f.category)).size||0)===1?'y':'ies'}</div>
    </div>
  </div>`;

  // Empty state
  if(!findings.length){
    return `<div class="findings-wrap" style="animation-delay:.10s">
      <div class="ic-head">
        <div class="ic-ico g">${ICO.check}</div>
        <div>
          <div class="ic-title">Detected Findings &amp; Buyer Notes</div>
          <div class="ic-sub">Automated analysis · No issues found</div>
        </div>
      </div>
      ${summary}
      <div class="finding-empty">
        ${ICO.check} No critical, high or medium findings detected from the available data.
      </div>
      <div class="findings-foot">Findings are derived from MOT advisories, DVLA records and Experian/PNC data. Absence of findings is not a guarantee of condition — always inspect before purchase.</div>
    </div>`;
  }

  const sevLabel = {crit:'Critical',high:'High',med:'Minor',low:'Note',info:'Insight'};

  const list = findings.map(f => {
    const metaChips = [];
    metaChips.push(`<span class="finding-chip cat">${ICO.info} ${f.category}</span>`);
    if(f.evidence) metaChips.push(`<span class="finding-chip evidence">${f.evidence}</span>`);
    if(f.cost) metaChips.push(`<span class="finding-chip cost">${ICO.info} Typical cost: ${f.cost}</span>`);
    if(f.recco) metaChips.push(`<span class="finding-chip recco">💡 ${f.recco}</span>`);

    return `<div class="finding ${f.severity}">
      <div class="finding-ico">${f.icon}</div>
      <div class="finding-body">
        <div class="finding-head">
          <div class="finding-title">${f.title}</div>
          <span class="severity-tag ${f.severity}">${sevLabel[f.severity]}</span>
        </div>
        ${f.desc?`<div class="finding-desc">${f.desc}</div>`:''}
        <div class="finding-meta">${metaChips.join('')}</div>
      </div>
    </div>`;
  }).join('');

  const headTone = counts.crit>0 ? 'r' : counts.high>0 ? 'a' : counts.med>0 ? 'a' : 'g';

  return `<div class="findings-wrap" style="animation-delay:.10s">
    <div class="ic-head">
      <div class="ic-ico ${headTone}">${counts.crit>0||counts.high>0?ICO.warn:ICO.info}</div>
      <div>
        <div class="ic-title">Detected Findings &amp; Buyer Notes</div>
        <div class="ic-sub">${findings.length} finding${findings.length>1?'s':''} · ${overallSubtitle}</div>
      </div>
    </div>
    ${summary}
    <div class="finding-list">${list}</div>
    <div class="findings-foot">Findings are derived from MOT advisories, DVLA records and Experian/PNC data where available. Recommendations are guidance only — always inspect a vehicle in person before buying. Cost ranges are typical UK retail estimates.</div>
  </div>`;
}

/* ══════════════════════════════════════
   MOT ANALYTICS ENGINE
══════════════════════════════════════ */
function motAnalytics(motResults) {
  const tests = (motResults||[]).slice().sort((a,b)=>new Date(a.DateOfTest||a.date)-new Date(b.DateOfTest||b.date));
  if(!tests.length) return null;

  const total = tests.length;
  const passes = tests.filter(t=>{
    const r=t.ResultText||(t.Result===true?'PASS':'FAIL');
    return String(r).toLowerCase().includes('pass');
  }).length;
  const fails = total - passes;
  const passRate = Math.round((passes/total)*100);

  // Mileage analysis
  const milePoints = tests
    .map(t=>({
      date:new Date(t.DateOfTest||t.date),
      miles:parseInt(t.OdometerModel?.OdometerReading||t.mileage||0)
    }))
    .filter(p=>p.miles>0 && !isNaN(p.date.getTime()));

  const firstMile = milePoints[0]?.miles||0;
  const lastMile = milePoints[milePoints.length-1]?.miles||0;
  const totalMiles = lastMile - firstMile;

  let yearsCovered = 0;
  if(milePoints.length>=2){
    yearsCovered = (milePoints[milePoints.length-1].date - milePoints[0].date) / (365.25*24*60*60*1000);
  }
  const avgMilesPerYear = yearsCovered>0 ? Math.round(totalMiles/yearsCovered) : 0;

  // Anomaly detection
  let anomaly = null;
  let anomalyIndex = -1;
  for(let i=1;i<milePoints.length;i++){
    if(milePoints[i].miles<milePoints[i-1].miles){
      anomaly = {type:'rollback', from:milePoints[i-1].miles, to:milePoints[i].miles, idx:i};
      anomalyIndex = i;
      break;
    }
    if(milePoints[i].miles-milePoints[i-1].miles>50000){
      anomaly = {type:'spike', delta:milePoints[i].miles-milePoints[i-1].miles, idx:i};
      anomalyIndex = i;
      break;
    }
  }

  // Advisory analysis
  const allAdvisories = tests.flatMap(t=>t.AdvisoryNotices_V2||t.AdvisoryNotices||[]);
  const totalAdvisories = allAdvisories.length;
  const advTexts = allAdvisories.map(a=>(a.Text||a.text||String(a)).toLowerCase());
  const advCategories = {
    tyre: advTexts.filter(t=>t.includes('tyre')||t.includes('tire')).length,
    brake: advTexts.filter(t=>t.includes('brake')).length,
    corrosion: advTexts.filter(t=>t.includes('corrod')||t.includes('rust')).length,
    suspension: advTexts.filter(t=>t.includes('suspension')||t.includes('shock')).length,
    light: advTexts.filter(t=>t.includes('lamp')||t.includes('light')||t.includes('bulb')).length,
  };
  const topCategory = Object.entries(advCategories).sort((a,b)=>b[1]-a[1])[0];
  const mostCommonAdv = topCategory && topCategory[1]>0 ? topCategory[0] : null;

  // Advisory trend (recent half vs older half)
  let advTrend = 'stable';
  if(tests.length>=4){
    const mid = Math.floor(tests.length/2);
    const recentAdv = tests.slice(mid).reduce((s,t)=>s+(t.AdvisoryNotices_V2||t.AdvisoryNotices||[]).length,0);
    const olderAdv = tests.slice(0,mid).reduce((s,t)=>s+(t.AdvisoryNotices_V2||t.AdvisoryNotices||[]).length,0);
    if(recentAdv > olderAdv*1.4) advTrend = 'increasing';
    else if(recentAdv < olderAdv*0.6) advTrend = 'decreasing';
  }

  return {
    total, passes, fails, passRate,
    firstMile, lastMile, totalMiles, avgMilesPerYear, yearsCovered,
    milePoints, anomaly, anomalyIndex,
    totalAdvisories, mostCommonAdv, advTrend,
  };
}

/* ══════════════════════════════════════
   KEEPER ANALYTICS ENGINE
══════════════════════════════════════ */
function keeperAnalytics(keepers) {
  const list = (keepers||[]).slice();
  if(!list.length) return null;

  // Normalise + sort oldest first
  const ordered = list.map(k=>({
    num: k.NumberPreviousKeepers,
    date: new Date(k.DateOfLastKeeperChange||k.date),
    raw: k
  })).filter(k=>!isNaN(k.date.getTime())).sort((a,b)=>a.date-b.date);

  if(!ordered.length) return null;

  const today = new Date();
  // For each keeper compute their tenure: from their transfer date to next keeper's transfer (or today for current)
  const segments = ordered.map((k,i)=>{
    const start = k.date;
    const end = i<ordered.length-1 ? ordered[i+1].date : today;
    const days = (end - start) / (24*60*60*1000);
    const years = days / 365.25;
    return {
      number: i+1,
      start, end, days, years,
      isCurrent: i === ordered.length-1,
      raw: k.raw
    };
  });

  const totalCount = segments.length;
  const totalYears = (today - ordered[0].date) / (365.25*24*60*60*1000);
  const avgYears = totalYears / totalCount;
  const sortedByDuration = [...segments].sort((a,b)=>b.years-a.years);
  const longest = sortedByDuration[0];
  const shortest = sortedByDuration[sortedByDuration.length-1];
  const current = segments[segments.length-1];

  // Turnover classification per segment
  segments.forEach(s=>{
    if(s.years>=4) s.tier='long';
    else if(s.years>=1.5) s.tier='med';
    else if(s.years>=0.5) s.tier='short';
    else s.tier='veryshort';
  });

  // Overall turnover flag
  let turnoverFlag = 'normal';
  if(avgYears < 1.2) turnoverFlag = 'high';
  else if(avgYears < 2) turnoverFlag = 'elevated';

  return {
    segments, totalCount, totalYears, avgYears,
    longest, shortest, current, turnoverFlag,
  };
}

/* ══════════════════════════════════════
   MILEAGE CHART (SVG)
══════════════════════════════════════ */
function renderMileageChart(analytics) {
  if(!analytics || !analytics.milePoints || analytics.milePoints.length<2){
    return `<div class="mileage-chart-wrap"><div class="mc-head"><div class="mc-title">Mileage Over Time</div></div><div style="padding:18px;text-align:center;color:var(--sub);font-size:13px;">Not enough mileage data points to plot a chart.</div></div>`;
  }
  const pts = analytics.milePoints;
  const w = 920, h = 220;
  const padL = 56, padR = 24, padT = 22, padB = 38;
  const innerW = w - padL - padR;
  const innerH = h - padT - padB;

  const minMiles = Math.min(...pts.map(p=>p.miles));
  const maxMiles = Math.max(...pts.map(p=>p.miles));
  const milesSpan = Math.max(maxMiles - minMiles, 1);
  const minDate = pts[0].date.getTime();
  const maxDate = pts[pts.length-1].date.getTime();
  const dateSpan = Math.max(maxDate - minDate, 1);

  const x = d => padL + ((d.getTime()-minDate)/dateSpan)*innerW;
  const y = m => padT + innerH - ((m-minMiles)/milesSpan)*innerH;

  // Grid lines (4 horizontal)
  const gridY = [0,0.25,0.5,0.75,1].map(t=>{
    const py = padT + innerH - t*innerH;
    const labelMiles = Math.round(minMiles + t*milesSpan);
    return `<line class="mc-grid-line" x1="${padL}" x2="${padL+innerW}" y1="${py}" y2="${py}"/><text class="mc-axis-label" x="${padL-8}" y="${py+3.5}" text-anchor="end">${(labelMiles/1000).toFixed(0)}k</text>`;
  }).join('');

  // X-axis date labels (first, last, middle if room)
  const dateFmt = d => d.toLocaleDateString('en-GB',{month:'short',year:'2-digit'});
  const xLabels = [
    `<text class="mc-axis-label" x="${x(pts[0].date)}" y="${h-padB+22}" text-anchor="start">${dateFmt(pts[0].date)}</text>`,
    `<text class="mc-axis-label" x="${x(pts[pts.length-1].date)}" y="${h-padB+22}" text-anchor="end">${dateFmt(pts[pts.length-1].date)}</text>`,
  ].join('');

  // Path
  const linePath = pts.map((p,i)=>(i===0?'M':'L')+x(p.date)+','+y(p.miles)).join(' ');
  const areaPath = linePath + ` L ${x(pts[pts.length-1].date)},${padT+innerH} L ${x(pts[0].date)},${padT+innerH} Z`;

  // Dots
  const dots = pts.map((p,i)=>{
    const isAnom = analytics.anomalyIndex === i;
    return `<circle class="${isAnom?'mc-dot-anomaly':'mc-dot'}" cx="${x(p.date)}" cy="${y(p.miles)}" r="${isAnom?5:4}"><title>${dateFmt(p.date)} — ${p.miles.toLocaleString()} miles</title></circle>`;
  }).join('');

  // Anomaly callout
  let anomBadge = '';
  if(analytics.anomaly){
    const txt = analytics.anomaly.type==='rollback'
      ? `Rollback: ${analytics.anomaly.from.toLocaleString()} → ${analytics.anomaly.to.toLocaleString()}`
      : `+${analytics.anomaly.delta.toLocaleString()} mi spike`;
    anomBadge = `<span class="mc-anomaly">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      Anomaly: ${txt}
    </span>`;
  }

  return `<div class="mileage-chart-wrap">
    <div class="mc-head">
      <div class="mc-title">Mileage Trend (${pts.length} data points)</div>
      ${anomBadge}
    </div>
    <svg class="mc-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet">
      <defs><linearGradient id="mcGradient" x1="0" x2="0" y1="0" y2="1">
        <stop offset="0%" stop-color="#16a34a" stop-opacity="0.55"/>
        <stop offset="100%" stop-color="#16a34a" stop-opacity="0"/>
      </linearGradient></defs>
      ${gridY}
      <path class="mc-area" d="${areaPath}"/>
      <path class="mc-line" d="${linePath}"/>
      ${dots}
      ${xLabels}
    </svg>
  </div>`;
}

/* ══════════════════════════════════════
   KEEPER TIMELINE BAR (SVG-FREE, FLEX)
══════════════════════════════════════ */
function renderKeeperTimeline(analytics) {
  if(!analytics) return '';
  const segs = analytics.segments;
  const totalDays = segs.reduce((s,seg)=>s+seg.days,0) || 1;

  const bar = segs.map((s,i)=>{
    const pct = (s.days/totalDays)*100;
    const yrs = s.years.toFixed(1);
    const label = s.years>=0.4 && pct>=8 ? `${yrs}y` : '';
    return `<div class="ktl-seg ${s.tier}" style="flex:${s.days};min-width:${pct<3?'30px':'auto'};" title="Keeper ${s.number}: ${yrs} years (${s.start.toLocaleDateString('en-GB',{month:'short',year:'numeric'})} → ${s.isCurrent?'now':s.end.toLocaleDateString('en-GB',{month:'short',year:'numeric'})})">${label}</div>`;
  }).join('');

  const startLabel = segs[0].start.toLocaleDateString('en-GB',{month:'short',year:'numeric'});
  const endLabel = 'Today';

  return `<div class="keeper-tl-wrap">
    <div style="font-size:11.5px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--sub);margin-bottom:6px;">Ownership Timeline</div>
    <div class="ktl-bar">${bar}</div>
    <div class="ktl-axis"><span>${startLabel}</span><span>${endLabel}</span></div>
    <div class="ktl-legend">
      <span class="ktl-legend-item"><span class="ktl-legend-swatch" style="background:linear-gradient(135deg,#16a34a,#22c55e);"></span>4+ years (long-term)</span>
      <span class="ktl-legend-item"><span class="ktl-legend-swatch" style="background:linear-gradient(135deg,#0891b2,#06b6d4);"></span>1.5–4 yrs (typical)</span>
      <span class="ktl-legend-item"><span class="ktl-legend-swatch" style="background:linear-gradient(135deg,#d97706,#f59e0b);"></span>6mo–1.5 yrs (short)</span>
      <span class="ktl-legend-item"><span class="ktl-legend-swatch" style="background:linear-gradient(135deg,#dc2626,#ef4444);"></span>&lt;6mo (red flag)</span>
    </div>
  </div>`;
}

/* ══════════════════════════════════════
   FULL-WIDTH MOT BLOCK
══════════════════════════════════════ */
function renderMotBlock(motResults) {
  const a = motAnalytics(motResults);
  if(!a){
    return `<div class="ic" style="margin-bottom:14px;animation-delay:.12s">
      <div class="ic-head">
        <div class="ic-ico b">${ICO.mot}</div>
        <div><div class="ic-title">MOT History</div><div class="ic-sub">DVSA official records</div></div>
      </div>
      <div class="dr" style="padding:16px 20px"><span class="dr-l">No MOT records found</span></div>
    </div>`;
  }

  // Stat strip
  const passCls = a.passRate>=90?'good':a.passRate>=70?'warn':'bad';
  const advCls = a.totalAdvisories<=5?'good':a.totalAdvisories<=15?'warn':'bad';
  const mileCls = a.anomaly ? 'bad' : 'good';

  const stats = `<div class="dash-strip mot">
    <div class="dash-cell">
      <div class="dc-lbl">Tests</div>
      <div class="dc-val">${a.total}</div>
      <div class="dc-sub">${a.passes} pass · ${a.fails} fail</div>
    </div>
    <div class="dash-cell">
      <div class="dc-lbl">Pass Rate</div>
      <div class="dc-val ${passCls}">${a.passRate}%</div>
      <div class="dc-sub ${passCls!=='good'?passCls:''}">${a.passRate>=90?'Strong record':a.passRate>=70?'Some failures':'High failure rate'}</div>
    </div>
    <div class="dash-cell">
      <div class="dc-lbl">Distance Covered</div>
      <div class="dc-val ${mileCls}">${(a.totalMiles/1000).toFixed(1)}k</div>
      <div class="dc-sub ${a.anomaly?'bad':''}">${a.anomaly?'Anomaly detected':'miles, smooth progression'}</div>
    </div>
    <div class="dash-cell">
      <div class="dc-lbl">Avg per Year</div>
      <div class="dc-val">${a.avgMilesPerYear?(a.avgMilesPerYear/1000).toFixed(1)+'k':'—'}</div>
      <div class="dc-sub">${a.avgMilesPerYear<8000?'Below average':a.avgMilesPerYear<14000?'Typical UK use':'High mileage'}</div>
    </div>
    <div class="dash-cell">
      <div class="dc-lbl">Advisories</div>
      <div class="dc-val ${advCls}">${a.totalAdvisories}</div>
      <div class="dc-sub ${advCls!=='good'?advCls:''}">${a.advTrend==='increasing'?'Trending up ↑':a.advTrend==='decreasing'?'Trending down ↓':'Stable trend'}</div>
    </div>
  </div>`;

  // Insight chips
  const insightChips = [];
  if(a.anomaly){
    insightChips.push(`<span class="dash-insight-chip bad">${ICO.warn} ${a.anomaly.type==='rollback'?'Mileage rollback':'Sudden mileage spike'}</span>`);
  }
  if(a.passRate===100 && a.total>=3){
    insightChips.push(`<span class="dash-insight-chip good">${ICO.check} Spotless MOT record</span>`);
  }
  if(a.advTrend==='increasing'){
    insightChips.push(`<span class="dash-insight-chip warn">${ICO.warn} Advisory frequency increasing</span>`);
  }
  if(a.advTrend==='decreasing'){
    insightChips.push(`<span class="dash-insight-chip good">${ICO.check} Improving condition</span>`);
  }
  if(a.mostCommonAdv){
    const labels={tyre:'Tyre',brake:'Brake',corrosion:'Corrosion',suspension:'Suspension',light:'Lighting'};
    insightChips.push(`<span class="dash-insight-chip info">${ICO.info} Top advisory area: ${labels[a.mostCommonAdv]}</span>`);
  }
  if(a.avgMilesPerYear>14000){
    insightChips.push(`<span class="dash-insight-chip warn">${ICO.warn} High annual mileage</span>`);
  }

  // Entry list (first 3 + collapsible rest)
  const tests = (motResults||[]).slice().sort((a2,b2)=>new Date(b2.DateOfTest||b2.date)-new Date(a2.DateOfTest||a2.date));

  function buildEntry(t,idx){
    const date = fmtDate(t.DateOfTest||t.date);
    const passed = t.ResultText||(t.Result===true?'PASS':'FAIL');
    const isPass = String(passed).toLowerCase().includes('pass');
    const miles = t.OdometerModel?.OdometerReading || t.mileage || null;
    const expiry = t.TestExpiryDate ? fmtDate(t.TestExpiryDate) : null;
    const adv = t.AdvisoryNotices_V2||t.AdvisoryNotices||[];
    const fails = t.RefusalReasons_V2||t.RefusalReasons||[];
    const advHtml = adv.length ? `
      <button class="mot-adv-toggle" onclick="var d=this.nextElementSibling;d.classList.toggle('open');this.firstChild.textContent=d.classList.contains('open')?'▲':'▼'"><span>▼</span> ${adv.length} advisor${adv.length>1?'ies':'y'}</button>
      <div class="mot-advisories">${adv.map(a=>`<div class="mot-adv-item">• ${(a.Text||a.text||String(a)).replace(/\(.*?\)/g,'')}</div>`).join('')}</div>` : '';
    const failHtml = fails.length ? `
      <button class="mot-fail-toggle" onclick="var d=this.nextElementSibling;d.classList.toggle('open');this.firstChild.textContent=d.classList.contains('open')?'▲':'▼'"><span>▼</span> ${fails.length} failure item${fails.length>1?'s':''}</button>
      <div class="mot-failures">${fails.map(f=>`<div class="mot-fail-item">⚠ ${(f.Text||f.text||String(f)).replace(/\(.*?\)/g,'')}</div>`).join('')}</div>` : '';
    return `<div class="mot-entry">
      <div class="mot-dot ${isPass?'pass':'fail'}"></div>
      <div class="mot-info">
        <div class="mot-date">${date} — <span style="color:${isPass?'var(--green)':'var(--red)'};font-weight:800">${isPass?'PASS':'FAIL'}</span></div>
        ${expiry?`<div class="mot-expiry">Expires: ${expiry}</div>`:''}
        ${miles?`<div class="mot-miles">${Number(miles).toLocaleString()} miles</div>`:''}
        ${advHtml}${failHtml}
      </div>
    </div>`;
  }

  const firstThree = tests.slice(0,3).map(buildEntry).join('');
  const rest = tests.slice(3);
  const restHtml = rest.length ? `
    <div class="mot-extra" id="motExtra">${rest.map(buildEntry).join('')}</div>
    <button class="mot-expand-btn" id="motExpandBtn" onclick="var ex=document.getElementById('motExtra');var b=document.getElementById('motExpandBtn');ex.classList.toggle('open');b.classList.toggle('open');b.querySelector('span').textContent=ex.classList.contains('open')?'Show fewer':'Show ${rest.length} more test${rest.length>1?'s':''}'">
      <span>Show ${rest.length} more test${rest.length>1?'s':''}</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
    </button>` : '';

  return `<div class="ic" style="margin-bottom:14px;animation-delay:.12s">
    <div class="ic-head">
      <div class="ic-ico b">${ICO.mot}</div>
      <div>
        <div class="ic-title">MOT History &amp; Mileage Analysis</div>
        <div class="ic-sub">DVSA records · ${a.total} tests · ${(a.totalMiles/1000).toFixed(1)}k miles tracked</div>
      </div>
    </div>
    ${stats}
    ${insightChips.length?`<div class="dash-insights">${insightChips.join('')}</div>`:''}
    ${renderMileageChart(a)}
    <div class="mot-entries">
      <div class="mot-entries-head">
        <span>Test History</span>
        <span style="color:var(--sub2);font-weight:400;text-transform:none;letter-spacing:0;">Most recent first</span>
      </div>
      ${firstThree}
      ${restHtml}
    </div>
  </div>`;
}

/* ══════════════════════════════════════
   FULL-WIDTH KEEPER BLOCK
══════════════════════════════════════ */
function renderKeeperBlock(keepers) {
  const a = keeperAnalytics(keepers);
  if(!a){
    return `<div class="ic" style="margin-bottom:14px;animation-delay:.13s">
      <div class="ic-head">
        <div class="ic-ico p">${ICO.people}</div>
        <div><div class="ic-title">Keeper History</div><div class="ic-sub">DVLA ownership records</div></div>
      </div>
      <div class="dr" style="padding:16px 20px"><span class="dr-l">No keeper records</span></div>
    </div>`;
  }

  const fmtYrs = y => y>=1 ? `${y.toFixed(1)} yrs` : `${Math.round(y*12)} mo`;
  const turnoverCls = a.turnoverFlag==='high'?'bad':a.turnoverFlag==='elevated'?'warn':'good';
  const turnoverNote = a.turnoverFlag==='high'?'High turnover ⚠':a.turnoverFlag==='elevated'?'Elevated turnover':'Stable ownership';

  const stats = `<div class="dash-strip keeper">
    <div class="dash-cell">
      <div class="dc-lbl">Total Keepers</div>
      <div class="dc-val ${a.totalCount<=3?'good':a.totalCount<=5?'warn':'bad'}">${a.totalCount}</div>
      <div class="dc-sub ${a.totalCount<=3?'':a.totalCount<=5?'warn':'bad'}">${a.totalCount<=3?'Low ownership history':a.totalCount<=5?'Average':'High keeper count'}</div>
    </div>
    <div class="dash-cell">
      <div class="dc-lbl">Years on Road</div>
      <div class="dc-val">${a.totalYears.toFixed(1)}</div>
      <div class="dc-sub">${a.segments[0].start.toLocaleDateString('en-GB',{year:'numeric'})} → today</div>
    </div>
    <div class="dash-cell">
      <div class="dc-lbl">Avg Tenure</div>
      <div class="dc-val ${turnoverCls}">${fmtYrs(a.avgYears)}</div>
      <div class="dc-sub ${turnoverCls!=='good'?turnoverCls:''}">${turnoverNote}</div>
    </div>
    <div class="dash-cell">
      <div class="dc-lbl">Current Keeper</div>
      <div class="dc-val">${fmtYrs(a.current.years)}</div>
      <div class="dc-sub">Since ${a.current.start.toLocaleDateString('en-GB',{month:'short',year:'numeric'})}</div>
    </div>
  </div>`;

  // Insight chips
  const chips = [];
  if(a.turnoverFlag==='high') chips.push(`<span class="dash-insight-chip bad">${ICO.warn} High turnover — investigate why</span>`);
  if(a.turnoverFlag==='elevated') chips.push(`<span class="dash-insight-chip warn">${ICO.warn} Above-average keeper turnover</span>`);
  if(a.longest.years>=5) chips.push(`<span class="dash-insight-chip good">${ICO.check} One owner kept ${a.longest.years.toFixed(1)} years</span>`);
  if(a.shortest.years<0.5 && a.totalCount>1) chips.push(`<span class="dash-insight-chip warn">${ICO.warn} One keeper held &lt;6 months</span>`);
  if(a.current.years>=3) chips.push(`<span class="dash-insight-chip good">${ICO.check} Long-term current owner</span>`);

  // Detail rows (newest first for readability)
  const rowsReverse = a.segments.slice().reverse();
  const rows = rowsReverse.map(s=>{
    const tagText = s.isCurrent ? 'Current' : s.tier==='long'?'Long-term':s.tier==='med'?'Typical':s.tier==='short'?'Short':'Very short';
    const tagCls = s.isCurrent ? 'current' : s.tier;
    return `<div class="ktl-row">
      <div class="ktl-row-num ${s.tier}">${s.number}</div>
      <div class="ktl-row-name">Keeper ${s.number}<span>${s.start.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})} → ${s.isCurrent?'present':s.end.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</span></div>
      <div class="ktl-row-dur">${fmtYrs(s.years)}</div>
      <div class="ktl-row-tag ${tagCls}">${tagText}</div>
    </div>`;
  }).join('');

  return `<div class="ic" style="margin-bottom:14px;animation-delay:.13s">
    <div class="ic-head">
      <div class="ic-ico p">${ICO.people}</div>
      <div>
        <div class="ic-title">Ownership History &amp; Keeper Analysis</div>
        <div class="ic-sub">DVLA records · ${a.totalCount} keeper${a.totalCount>1?'s':''} · ${a.totalYears.toFixed(1)} yrs tracked</div>
      </div>
    </div>
    ${stats}
    ${chips.length?`<div class="dash-insights">${chips.join('')}</div>`:''}
    ${renderKeeperTimeline(a)}
    <div class="ktl-rows">${rows}</div>
  </div>`;
}

async function loadReport() {
  try {
    if(!sessionId){ showError('Missing payment session. Please complete checkout first.'); return; }

    const r1 = await fetch(`${API}/payment/success?session_id=${sessionId}`);
    const sd = await r1.json();
    console.log('[CRC] session:', sd);

    if(sd.error){ showError('Payment verification failed: '+sd.error); return; }
    if(sd.sessionId){ localStorage.setItem('sessionId',sd.sessionId); localStorage.setItem('email',sd.email||''); }

    const reg = sd.reg;
    if(!reg){ showError('Invalid session — registration not found.'); return; }
    globalReg = reg;

    const sid = localStorage.getItem('sessionId');
    if(!sid||sid==='null'){ showError('Session missing after payment.'); return; }

    const r2 = await fetch(`${API}/vehicle/full`,{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({registration:reg,sessionId:sid})
    });
    const data = await r2.json();
    console.log('[CRC] full data:', data);

    const premiumUpsell =
  document.getElementById(
    'premiumUpsell'
  );

console.log(
  '[CRC] premiumUpsell:',
  premiumUpsell
);

console.log(
  '[CRC] tier:',
  data.tier
);

if (
  premiumUpsell &&
  data.tier === 'standard'
) {
  premiumUpsell.style.display =
    'block';

  console.log(
    '[CRC] showing premium upsell'
  );
}

    if(data.error){ showError('Failed to load report: '+data.error); return; }

    const v = normalise(data, reg);
    if(!v){ showError('Could not parse vehicle data.'); return; }


    document.getElementById('loader').style.display='none';
    window.__reportData = v;
    window.__rawData    = data;
    renderReport(v, data);

  } catch(e) {
    console.error(e);
    showError('An unexpected error occurred. Please try again.');
  }
}

  const now    = new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});

  function fmtD(d){
    if(!d) return 'N/A';
    try{ return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); }
    catch(e){ return String(d); }
  }
  function row(l,v)       { return `<tr><td>${l}</td><td>${v||'N/A'}</td></tr>`; }
  function greenRow(l,v)  { return `<tr><td>${l}</td><td style="color:#16a34a;font-weight:700">${v}</td></tr>`; }
  function redRow(l,v)    { return `<tr><td>${l}</td><td style="color:#dc2626;font-weight:700">${v}</td></tr>`; }
  function statusRow(l,val){
    const lv = String(val||'').toLowerCase();
    if(lv.includes('valid')||(lv.includes('taxed')&&!lv.includes('untaxed'))) return greenRow(l,val);
    if(lv.includes('fail')||lv.includes('expired')||lv.includes('untaxed')||lv.includes('sorn')||lv.includes('no detail')) return redRow(l,val);
    return row(l,val);
  }
  function checkRow(l,val){
    const lv=String(val||'').toLowerCase();
    const ok=lv==='clear'||lv==='no'||lv==='false'||lv==='none';
    const color=!val?'#6b7280':ok?'#16a34a':'#dc2626';
    const txt=!val?'N/A':ok?'✓ Clear':'⚠ Issue found';
    return `<tr><td>${l}</td><td style="color:${color};font-weight:700">${txt}</td></tr>`;
  }

  /* MOT rows */
  const motRows = (v.motResults||[]).slice(0,12).map(t => {
    const date  = fmtD(t.DateOfTest||t.date);
    const pass  = t.ResultText||(t.Result===true?'PASS':'FAIL');
    const isP   = String(pass).toLowerCase().includes('pass');
    const miles = t.OdometerModel&&t.OdometerModel.OdometerReading ? Number(t.OdometerModel.OdometerReading).toLocaleString()+' mi' : (t.mileage?Number(t.mileage).toLocaleString()+' mi':'—');
    const adv   = (t.AdvisoryNotices_V2||t.AdvisoryNotices||[]).length;
    return `<tr><td>${date}</td><td style="color:${isP?'#16a34a':'#dc2626'};font-weight:700">${isP?'PASS':'FAIL'}</td><td>${miles}</td><td>${adv>0?adv+' advisor'+(adv>1?'ies':'y'):'None'}</td></tr>`;
  }).join('');

  /* Keeper rows */
  const keepRows = (v.keeperHistory||[]).map((k,i) => {
    const num  = k.NumberPreviousKeepers||(v.keeperHistory.length-i);
    const date = fmtD(k.DateOfLastKeeperChange||k.date);
    return `<tr><td>Keeper ${num}</td><td>${date}</td></tr>`;
  }).join('');

  const taxBandRow = v.taxBand ? row('Tax Band','Band '+v.taxBand+(v.taxAnnualRate?' — £'+v.taxAnnualRate+'/yr':'')) : '';
  const bodyRow    = v.bodyStyle ? row('Body Style',v.bodyStyle) : '';
  const euroRow    = v.euroStatus ? row('Euro Status',v.euroStatus) : '';
  const wRow       = v.revenueWeight ? row('Revenue Weight',v.revenueWeight+' kg') : '';
  const avgMiRow   = v.averageMileage ? row('Average Mileage',parseInt(v.averageMileage).toLocaleString()+' mi/yr') : '';
  const riskLevel  = !v.riskScore?'':v.riskScore<=30?'Low Risk':v.riskScore<=60?'Medium Risk':'High Risk';
  const hasPaid    = rawData && (rawData.finance||rawData.stolen||rawData.writeOff);
  const motHasData = (v.motResults||[]).length > 0;
  const keepHasData= (v.keeperHistory||[]).length > 0;

  return `<!DOCTYPE html><html><head><meta charset="UTF-8"/>
    
<style>

body{font-family:Arial,sans-serif;color:#1c1c1e;font-size:13px;background:#fff;}

.h-left h1{font-size:20px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px;}
.h-left p{color:#6b7280;font-size:11px;}
.logo{height:52px;width:auto;}
.plate{display:inline-flex;border:2px solid #111;border-radius:6px;overflow:hidden;font-weight:800;font-size:17px;letter-spacing:2px;margin:8px 0 4px;}
.plate-eu{background:#1a237e;color:white;padding:4px 7px;font-size:8px;text-align:center;line-height:1.3;}
.plate-num{background:#F8D347;padding:7px 16px;}
.stamp{background:#f0fdf4;border:1px solid rgba(22,163,74,.2);border-radius:6px;padding:8px 14px;margin-bottom:18px;font-size:11.5px;color:#14532d;font-weight:600;}
.section{margin-bottom:20px;}
.section h2{font-size:13px;font-weight:700;background:#f5f5f7;padding:7px 12px;border-left:3px solid #16a34a;margin-bottom:0;}
table{width:100%;border-collapse:collapse;}
td,th{padding:7px 12px;border-bottom:1px solid #e5e5ea;font-size:12.5px;text-align:left;}
td:first-child{color:#6c6c70;width:42%;}
tr:last-child td{border-bottom:none;}
tr:nth-child(even) td{background:#fafafa;}
.mt thead th{background:#e5e5ea;font-size:11.5px;font-weight:700;color:#1c1c1e;}
.footer{border-top:1px solid #e5e5ea;padding-top:12px;margin-top:28px;font-size:10.5px;color:#aeaeb2;text-align:center;line-height:1.6;}
@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}
</style></head><body>
<div class="page">

<div class="header">
  <div class="h-left">
    <h1>Vehicle History Report</h1>
    <p>Generated: ${now}</p>
    <div class="plate">
      <div class="plate-eu">🇬🇧<br/>UK</div>
      <div class="plate-num">${reg}</div>
    </div>
  </div>
  <img class="logo" src="data:image/png;base64,${LOGO_B64}" alt="CheapRegCheck"/>
</div>

<div class="stamp">✓ DVLA verified data · CheapRegCheck.co.uk · Official UK government sources</div>

<div class="section">
  <h2>Vehicle Details</h2>
  <table>
    ${row('Registration',reg)}
    ${row('Make & Model',make)}
    ${row('Year',v.yearOfManufacture||'N/A')}
    ${row('Colour',v.colour||'N/A')}

    ${row('CO₂',v.co2Emissions?v.co2Emissions+' g/km':'N/A')}

    ${avgMiRow}
  </table>
</div>

<div class="section">
  <h2>Tax &amp; Registration Status</h2>
  <table>

    ${statusRow('Tax Status',taxS)}
    ${row('Tax Due',v.taxDueDate?fmtD(v.taxDueDate):'N/A')}

    ${row('First Registered',v.monthOfFirstRegistration||'N/A')}
    ${row('Last V5C Issued',fmtD(v.dateOfLastV5CIssued))}

</div>

${hasPaid?`

    ${checkRow('Insurance Write-off',rawData.writeOff)}

${motHasData?`

    <tbody>${motRows}</tbody>
  </table>
</div>`:''}

${keepHasData?`
<div class="section">

${v.riskScore !== undefined && v.riskScore !== null ? `

    ${row('Risk Level', riskLevel)}

</div>
` : ''}

<div class="footer">
  CheapRegCheck is not affiliated with DVLA or DVSA. Data sourced from official UK government databases.<br/>
  This report is for personal use only. © ${new Date().getFullYear()} CheapRegCheck UK
</div>
</div></body></html>`;
}

async function downloadPDF() {
  if(!globalReg){ alert('Missing registration'); return; }
  const sid = localStorage.getItem('sessionId');

  /* Try backend PDF endpoint first */
  try {
    const res = await fetch(`${API}/vehicle/pdf`,{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({registration:globalReg,sessionId:sid}),
      signal: AbortSignal.timeout ? AbortSignal.timeout(8000) : undefined
    });
    if(res.ok){
      const blob = await res.blob();
      if(blob.size > 500){
        const url = URL.createObjectURL(blob);
        const a   = document.createElement('a');
        a.href=url; a.download=`${globalReg}-report.pdf`; a.click();
        return;
      }
    }
  } catch(e){ /* fall through */ }

  /* Client-side branded PDF (open print dialog) */
  const v = window.__reportData;
  if(!v){ alert('Report not loaded yet.'); return; }
  const pdfHtml = buildPdfHtml(v, window.__rawData || {});
  const blob    = new Blob([pdfHtml], {type:'text/html'});
  const url     = URL.createObjectURL(blob);
  const win     = window.open(url, '_blank');
  if(win) win.onload = () => setTimeout(() => win.print(), 600);
}

async function upgradeToPremium() {
  if (!globalReg) {
    alert('Cannot upgrade — registration not loaded.');
    return;
  }
  try {
    const res = await fetch(`${API}/payment/checkout`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        registration: globalReg,
        tier: 'premium',
        type: 'upgrade',
        quantity: 1
      })
    });
    const data = await res.json();
    if (!data.url) {
      alert('Payment session could not be created.');
      return;
    }
    window.location.href = data.url;
  } catch (err) {
    console.error('[CRC] upgrade error:', err);
    alert('Upgrade failed. Please try again.');
  }
}

loadReport();

// Auto-trigger upgrade flow if landing from email upgrade link
(function autoTriggerFromEmail() {
  const params = new URLSearchParams(window.location.search);
  const action = params.get('action');
  const linkReg = params.get('reg');

  if (action === 'upgrade' && linkReg) {
    setTimeout(function() {
      const onScreenReg = (window.globalReg || '').toUpperCase().trim();
      const fromLink = linkReg.toUpperCase().trim();

      if (onScreenReg === fromLink) {
        console.log('[CRC] Auto-triggering upgrade from email link');
        upgradeToPremium();
      } else {
        console.warn('[CRC] Email upgrade link mismatch — not auto-triggering');
      }
    }, 1500);
  }
})();
