<!DOCTYPE html>
<html>
<head>
  <title>Premium Vehicle Report</title>
  <style>
    body {
      margin:0;
      font-family: Arial, sans-serif;
      background:#ffffff;
      color:#111827;
    }

    /* NAVBAR */
    .nav {
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:15px 25px;
      border-bottom:1px solid #e5e7eb;
      background:white;
      position:sticky;
      top:0;
      z-index:1000;
    }

    .nav img {
      height:45px;
    }

    .nav-links {
      display:flex;
      gap:20px;
    }

    .nav-links a {
      text-decoration:none;
      color:#6b7280;
      font-size:14px;
    }

    .nav-links a:hover {
      color:#16a34a;
    }

    /* MOBILE */
    .menu-btn {
      display:none;
      font-size:22px;
      cursor:pointer;
    }

    @media(max-width:768px) {
      .nav-links {
        display:none;
        flex-direction:column;
        position:absolute;
        top:60px;
        right:20px;
        background:white;
        border:1px solid #e5e7eb;
        padding:15px;
        border-radius:10px;
      }

      .nav-links.show {
        display:flex;
      }

      .menu-btn {
        display:block;
      }
    }

    /* MAIN */
    .container {
      max-width:1000px;
      margin:auto;
      padding:30px 20px;
    }

    .card {
      background:white;
      border:1px solid #e5e7eb;
      padding:20px;
      border-radius:16px;
    }

    .grid {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
      margin-top:20px;
    }

    @media(max-width:768px) {
      .grid {
        grid-template-columns:1fr;
      }
    }

    .small-card {
      border:1px solid #e5e7eb;
      padding:15px;
      border-radius:10px;
    }

    .green {
      color:#16a34a;
    }

    .btn {
      padding:15px 30px;
      background:#16a34a;
      border:none;
      border-radius:10px;
      color:white;
      font-size:16px;
      cursor:pointer;
    }

    .btn:hover {
      background:#15803d;
    }

    .section {
  margin-top:20px;
}

.hero {
  background:white;
  border-radius:16px;
  padding:25px;
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

.reg {
  font-size:28px;
  font-weight:bold;
}

.sub {
  color:#6b7280;
}

.value-box {
  font-size:28px;
  font-weight:bold;
  color:#16a34a;
}

.insight {
  background:#f3f4f6;
  padding:10px;
  border-radius:8px;
  margin-top:8px;
}

.badge {
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
  margin-top:5px;
  display:inline-block;
}

.low { background:#dcfce7; color:#166534; }
.medium { background:#fef9c3; color:#854d0e; }
.high { background:#fee2e2; color:#991b1b; }

.risk-score {
  font-size:32px;
  font-weight:bold;
}

/* 🔥 PREMIUM UPGRADE (ADD ONLY) */
.card {
  box-shadow: 0 10px 30px rgba(0,0,0,0.04);
}

.hero {
  border: 1px solid #e5e7eb;
  background: linear-gradient(to right, #ffffff, #f9fafb);
}

.premium-banner {
  background: #111827;
  color: white;
  padding: 10px 15px;
  border-radius: 10px;
  font-size: 13px;
  margin-bottom: 15px;
}

  </style>
</head>
<body>
<!-- NAVBAR -->
<div class="nav">
  <a href="index.html">
    <img src="./mylogo/logo.png" style="height:90px;">
  </a>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <div class="nav-links" id="menu">
    <a href="index.html">Home</a>
    <a href="pricing.html">Pricing</a>
    <a href="contact.html">Contact</a>
    <a href="check.html">Check Vehicle</a>
  </div>
</div>
<!-- MAIN -->
<div class="container">
  <div id="report">Loading premium report...</div>
</div>

<script>
const API = "https://vehicle-history-backend-production.up.railway.app";

const urlParams = new URLSearchParams(window.location.search);
const sessionId = urlParams.get("session_id");
const regFromDashboard = urlParams.get("reg");

// 🔥 LOAD USER FROM LOCAL STORAGE
const userId = localStorage.getItem("userId");

let globalReg = null;

/* MOBILE MENU */
function toggleMenu() {
  const menu = document.getElementById("menu");
  if (menu) menu.classList.toggle("show");
}

async function loadReport() {
  try {

    console.log("🚀 LOAD REPORT STARTED");

    if (!sessionId) {
      document.getElementById("report").innerHTML = "❌ Missing session";
      return;
    }

    const reportEl = document.getElementById("report");

    // =========================
    // 1️⃣ VERIFY PAYMENT
    // =========================
    const res1 = await fetch(`${API}/payment/success?session_id=${sessionId}`);
    const sessionData = await res1.json();

    console.log("SESSION DATA:", sessionData);

    if (sessionData.error) {
      reportEl.innerHTML = "❌ Payment verification failed";
      return;
    }

    const reg = sessionData?.reg;

    if (!reg) {
      reportEl.innerHTML = "❌ Invalid session";
      return;
    }

    globalReg = reg;

    // 🔥 SAVE USER (LOGIN)
    if (data.token) {
    localStorage.setItem("token", data.token);
    console.log("✅ TOKEN STORED");
  }

    // =========================
    // 2️⃣ FETCH FULL REPORT (🔥 FIXED)
    // =========================
    const res2 = await fetch(`${API}/vehicle/full`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        registration: reg,
        sessionId,
        userId
      })
    });

    const data = await res2.json();
    console.log("FULL DATA:", data);

    if (data.error) {
      reportEl.innerHTML = "❌ Failed to load report";
      return;
    }

    // =========================
    // UI LOGIC
    // =========================
    const isPremium = data.finance !== "unknown";

    let riskClass = "low";
    let riskText = "LOW RISK";

    if (data.riskScore > 60) {
      riskClass = "high";
      riskText = "HIGH RISK";
    } else if (data.riskScore > 30) {
      riskClass = "medium";
      riskText = "MEDIUM RISK";
    }

    // =========================
    // RENDER
    // =========================
    reportEl.innerHTML = `
    <div class="premium-banner">
      ✔ Verified vehicle report • Trusted data
    </div>

    <div class="hero">

      <div>
        <span class="badge ${isPremium ? 'high' : 'low'}">
          ${isPremium ? 'PREMIUM REPORT' : 'BASIC REPORT'}
        </span>

        <div class="reg">${data.vehicle?.reg || reg}</div>

        <div class="sub">
          ${data.vehicle?.make || "N/A"} ${data.vehicle?.model || ""}
        </div>

        <div class="sub">
          ${data.vehicle?.fuel || "N/A"} • ${data.vehicle?.colour || "N/A"}
        </div>
      </div>

      <div style="text-align:right;">
        <div class="risk-score">${data.riskScore || 0}</div>
        <div class="badge ${riskClass}">${riskText}</div>
      </div>

    </div>

    <div class="section card">
      <h3>Vehicle Details</h3>
      <div class="grid">
        ${info("Make", data.vehicle?.make)}
        ${info("Model", data.vehicle?.model)}
        ${info("Fuel", data.vehicle?.fuel)}
        ${info("Colour", data.vehicle?.colour)}
      </div>
    </div>

    <div class="section card">
      <h3>Checks</h3>
      <div class="grid">

        ${isPremium
          ? status("Finance", data.finance !== "outstanding")
          : locked("Finance")}

        ${isPremium
          ? status("Stolen", data.stolen !== "yes")
          : locked("Stolen")}

        ${isPremium
          ? status("Write-off", data.writeOff !== "yes")
          : locked("Write-off")}

      </div>
    </div>

    <div class="section card">
      <h3>Insights</h3>
      ${
        data.insights?.length
          ? data.insights.map(i => `<div class="insight">• ${i}</div>`).join("")
          : "<p>No insights</p>"
      }
    </div>

    <button class="btn" onclick="downloadPDF()">
      📄 Download PDF
    </button>
    `;

  } catch (err) {
    console.error("❌ ERROR:", err);
    document.getElementById("report").innerHTML = "❌ Server error";
  }
}

/* PDF */
async function downloadPDF() {
  if (!globalReg) return alert("Missing reg");

  const res = await fetch(`${API}/vehicle/pdf`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ registration: globalReg })
  });

  const blob = await res.blob();
  const url = window.URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = `${globalReg}-report.pdf`;
  a.click();
}

/* HELPERS */
function info(label, value) {
  return `
    <div class="small-card">
      <div style="color:#6b7280;">${label}</div>
      <div style="font-weight:bold;">${value || "N/A"}</div>
    </div>
  `;
}

function status(label, ok) {
  return `
    <div class="small-card">
      <div>${label}</div>
      <div style="color:${ok ? "#16a34a" : "red"};">
        ${ok ? "✔ Clear" : "⚠ Issue"}
      </div>
    </div>
  `;
}

function locked(label) {
  return `
    <div class="small-card">
      <div>${label}</div>
      <div style="color:#9ca3af;">🔒 Premium</div>
    </div>
  `;
}

document.addEventListener("DOMContentLoaded", loadReport);
</script>

</body>
</html>
